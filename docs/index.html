* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #0a0a12;
  overflow: hidden;
  font-family: "Segoe UI", system-ui, sans-serif;
  -webkit-user-select: none;
  user-select: none;
}

#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a12;          /* 레터박스(여백) 배경 */
}

/* 16:9 게임 화면을 어떤 해상도에서도 잘리지 않게 contain(레터박스).
   검증된 vw/vh + max 기법만 사용(구형 브라우저 호환). 요소 박스 = 보이는 게임 영역. */
#game {
  background: #11111d;
  width: 100vw;
  height: 56.25vw;          /* 16:9 */
  max-height: 100vh;
  max-width: 177.78vh;
  display: block;
}

/* === 가로 강제 === 세로 화면이면 캔버스를 90° 회전시켜 항상 가로로 표시.
   (기기 자동회전 on/off·풀스크린 여부와 무관. 터치 좌표는 JS에서 보정)
   회전은 fixed 요소(#stage)가 아니라 #game(캔버스)에 직접 적용 — iOS Safari의
   'position:fixed + transform' 렌더 버그 회피. #stage는 변형 없이 중앙 정렬만 한다. */
@media (orientation: portrait) {
  #game {
    width: 100vh;           /* 회전 후 화면 가로축 = 뷰포트 세로 */
    height: 56.25vh;        /* 16:9 */
    max-height: 100vw;
    max-width: 177.78vw;
    transform-origin: center center;
    transform: rotate(90deg);
  }
}

<script>
/* =========================================================================
 *  전단지 아티스트 (Handill Artist) — 코어루프 프로토타입
 *  HTML5 Canvas / Vanilla JS · 픽셀 그래픽(절차적 렌더, 외부 에셋 없음)
 *  10개 스테이지 선형 진출 (동네 골목 → … → 청와대)

(() => {
  "use strict";

  const canvas = document.getElementById("game");

  // 디자인 좌표계는 480×270 으로 유지하되, 백킹 스토어는 고해상도로 만들어
  // 텍스트가 또렷하게 래스터화되도록 한다(저해상도 → nearest 확대 시 글자 뭉개짐 해결).
  const VW = 480, VH = 270;
  const RS = 2;                       // 렌더 스케일 (960×540 백킹) — 픽셀 폰트 또렷
  canvas.width = VW * RS;
  canvas.height = VH * RS;
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;  // 사각형 픽셀 아트는 또렷하게
  ctx.scale(RS, RS);                  // 이후 모든 그리기는 디자인 좌표(480×270) 기준

  // [최적화] ctx.filter(brightness)는 모바일 Canvas2D에서 매우 비싸므로 사용하지 않는다.
  // 어둡기는 '색을 곱하는' DK()로만 처리(그려진 픽셀만 어두워짐, 사각형 박스 없음).
  const FILTER_OK = false;            // 항상 false — 어떤 기기에서도 filter 미사용
  const DIM78 = "rgba(0,0,0,0.22)";   // brightness(0.78) — 배경 건물(직사각형)용 오버레이
  // 색을 f배 곱해 어둡게. 같은 색이 반복되므로 결과를 캐시(문자열 파싱 1회).
  const _dkCache = {};
  function darken(c, f) {
    if (typeof c !== "string") return c;
    const key = c + "|" + f;
    const hit = _dkCache[key]; if (hit !== undefined) return hit;
    let out = c;
    if (c[0] === "#") {
      let r, g, b;
      if (c.length === 4) { r = parseInt(c[1] + c[1], 16); g = parseInt(c[2] + c[2], 16); b = parseInt(c[3] + c[3], 16); }
      else { r = parseInt(c.slice(1, 3), 16); g = parseInt(c.slice(3, 5), 16); b = parseInt(c.slice(5, 7), 16); }
      out = "rgb(" + Math.round(r * f) + "," + Math.round(g * f) + "," + Math.round(b * f) + ")";
    } else {
      const m = c.match(/[\d.]+/g);
      if (c.indexOf("rgb") === 0 && m) { const a = m[3] !== undefined ? m[3] : 1; out = "rgba(" + Math.round(m[0] * f) + "," + Math.round(m[1] * f) + "," + Math.round(m[2] * f) + "," + a + ")"; }
    }
    _dkCache[key] = out; return out;
  }
  const DK = (c) => darken(c, 0.6);   // FILTER_OK 항상 false

  let skyStage = -1;

  const FLYER = { name: "전단지", color: "#f4f4f2" };

  const BOOTH = { x: 1545, y: GROUND_Y };

  const TUNE = {
    moveSpeed: 1.6,

    climbSpeed: 1.7,
    attachTime: 0.4,       // 전단지 1장 부착 소요(초) — 스팟당 10장
    slotsPerSpot: 10,      // 한 스팟당 부착 가능 전단지 수
    timeStart: 60,         // 제한시간(초)
    reportPenalty: 50,     // 민원 신고당하면 점수 차감
    spotPenalty: 100,      // 단속반에게 단속당하면 점수 차감

      else if (name === "complete") { tone(659, n, 0.12, "triangle", 0.24); tone(784, n + 0.12, 0.12, "triangle", 0.24); tone(988, n + 0.24, 0.12, "triangle", 0.24); tone(1318, n + 0.36, 0.3, "triangle", 0.26); }  // 게임 완료(팡파레)
    }
    function stopMusic() { if (mtimer) { clearTimeout(mtimer); mtimer = null; } cur = null; }
    function startMusic(track) {
      ensure(); stopMusic(); if (!ctx) return; cur = track;
      const seq = MUSIC[track]; let i = 0;
      const step = () => {
        if (cur !== track || !ctx) return;
        const [f, d] = seq[i % seq.length];
        tone(f, ctx.currentTime, (d / 1000) * 0.92, "triangle", 0.1);
        if (f) tone(f / 2, ctx.currentTime, (d / 1000) * 0.9, "sine", 0.05);   // 베이스 변주(서브 옥타브)
        i++; mtimer = setTimeout(step, d);

    return { ensure, sfx, sync };
  })();
  let best = loadBest();
  progress = clamp((best.stage || 1) - 1, 0, STAGES.length - 1);   // 이전에 해금한 스테이지 복원
  if (!best.name) state = STATE.NAME;    // 최초 진입 → 닉네임 등록

  // 닉네임 입력 — 캔버스 입력 박스 위에 실제 <input>을 겹쳐 띄움(한글/모바일 키보드 정상)
  let nameInput = null;
  const NAME_FIELD = { x: VW / 2 - 100, y: 116, w: 200, h: 30 };
  function ensureNameInput() {

  }
  function placeNameInput() {            // 캔버스 박스 위치에 정확히 겹치게 배치
    ensureNameInput(); if (!nameInput) return;
    try {
      const r = canvas.getBoundingClientRect();
      nameInput.style.display = "block";
      const portrait = window.matchMedia && matchMedia("(orientation: portrait)").matches;
      if (!portrait) {
        const sx = r.width / VW, sy = r.height / VH;
        nameInput.style.transform = "none";
        nameInput.style.left = (r.left + NAME_FIELD.x * sx) + "px";
        nameInput.style.top = (r.top + NAME_FIELD.y * sy) + "px";
        nameInput.style.width = (NAME_FIELD.w * sx) + "px";
        nameInput.style.height = (NAME_FIELD.h * sy) + "px";

        const scaleX = cssW / VW, scaleY = cssH / VH;
        const dcx = NAME_FIELD.x + NAME_FIELD.w / 2, dcy = NAME_FIELD.y + NAME_FIELD.h / 2;

        const scx = cx - uy, scy = cy + ux;                  // 회전 후 화면 중심
        nameInput.style.left = scx + "px";
        nameInput.style.top = scy + "px";
        nameInput.style.width = (NAME_FIELD.w * scaleX) + "px";
        nameInput.style.height = (NAME_FIELD.h * scaleY) + "px";
        nameInput.style.transformOrigin = "center center";
        nameInput.style.transform = "translate(-50%,-50%) rotate(90deg)";

  }
  function focusName() { placeNameInput(); try { if (nameInput) nameInput.focus(); } catch (e) {} }
  function hideNameInput() { try { if (nameInput) { nameInput.blur(); nameInput.style.display = "none"; } } catch (e) {} }
  async function confirmName() {
    if (claiming) return;
    const v = ((nameInput && nameInput.value) || "").trim().slice(0, 8);

    }

  // --- 입력 ----------------------------------------------------------------

  const pressed = {};
  // 테스트용 데이터 초기화(닉네임·기록·강아지·튜토리얼·해금 전부 리셋)
  function resetData() {
    try { localStorage.removeItem("handill_best"); } catch (e) {}

    progress = clamp((best.stage || 1) - 1, 0, STAGES.length - 1);

    state = best.name ? STATE.MENU : STATE.NAME;
    try { if (nameInput) nameInput.value = ""; } catch (e) {}

  }
  window.addEventListener("keydown", (e) => {

  });
  window.addEventListener("keyup", (e) => { keys[e.key] = false; });
  function consumePress(k) { if (pressed[k]) { pressed[k] = false; return true; } return false; }

  const hit = (b, mx, my) => mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;

  // 화면 좌표(clientX/Y) → 디자인 좌표(480×270). 세로 화면일 땐 게임이 90° 회전돼 있으므로 역회전 보정.
  function toDesign(clientX, clientY) {
    const r = canvas.getBoundingClientRect();

    }
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;   // 회전 중심(= 캔버스 중심)

  }

  canvas.addEventListener("pointerdown", (e) => {

      focusName();                                // 탭하면 입력창 포커스(모바일 키보드)
      if (hit(NAME_BTN, mx, my)) confirmName();
    } else if (state === STATE.MENU) {
      if (hit(PLAY_BTN, mx, my)) { Audio.sfx("button"); startIntro(); }
      else if (hit(RANK_BTN, mx, my)) { Audio.sfx("button"); recordsPage = 0; state = STATE.RECORDS; refreshBoard(0); }
      else if (hit(SHOP_BTN, mx, my)) { Audio.sfx("button"); shopMsg = ""; state = STATE.SHOP; }
      else if (hit(STAGE_BOX, mx, my)) { Audio.sfx("button"); selectConfirm = null; state = STATE.SELECT; }
    } else if (state === STATE.SHOP) {
      if (hit(BACK_BTN, mx, my)) { Audio.sfx("button"); state = STATE.MENU; }
      else for (let i = 0; i < SHOP_ITEMS.length; i++) { if (hit(SHOP_BUY[i], mx, my)) { buyItem(SHOP_ITEMS[i]); break; } }
    } else if (state === STATE.SELECT) {
      if (selectConfirm !== null) {                    // 확인 다이얼로그 우선 처리
        if (hit(CONF_YES, mx, my)) { Audio.sfx("button"); const idx = selectConfirm; selectConfirm = null; startIntro(idx); }
        else if (hit(CONF_NO, mx, my)) { Audio.sfx("button"); selectConfirm = null; }

      }

      else if (hit(ARROW_R, mx, my)) { Audio.sfx("button"); recordsPage = (recordsPage + 1) % np; refreshBoard(recordsPage); }
    } else if (state === STATE.INTRO) {

    } else if (state === STATE.PLAYING) {
      if (mx >= PAUSE_BTN.x - 4 && mx <= PAUSE_BTN.x + PAUSE_BTN.w + 4 && my >= PAUSE_BTN.y - 4 && my <= PAUSE_BTN.y + PAUSE_BTN.h + 4) { Audio.sfx("button"); state = STATE.PAUSED; }
    } else if (state === STATE.PAUSED) {
      for (const b of pauseBtns) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { Audio.sfx("button"); b.action(); break; }
      }
    } else if (state === STATE.SETTLE) {
      for (const b of settleBtns) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { Audio.sfx("button"); b.action(); break; }
      }
    }
  });

  // ===== 모바일 가상 컨트롤 (가로 터치) — 좌: 원형 베이스 안 방향, 우: 액션 버튼 =====
  // 게임 로직은 건드리지 않고 keys/pressed 에 그대로 주입한다(키보드 핸들러와 동일).
  const TOUCH = (window.matchMedia && matchMedia("(pointer: coarse)").matches) || ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
  const PAD = { base: { x: 60, y: 205, r: 41 }, arrowR: 25, btn: { x: 432, y: 214, r: 21 }, dead: 12 };
  const pad = { stickId: null, vec: null, btnId: null, dirs: { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false } };
  function padVisible() { return state === STATE.PLAYING && (TOUCH || window.FORCE_PAD); }
  function padPt(e) { return toDesign(e.clientX, e.clientY); }
  function vkeyJ(down) { if (down) { if (!keys["j"]) pressed["j"] = true; keys["j"] = true; } else keys["j"] = false; }
  function setStick(px, py) {
    const b = PAD.base; let dx = px - b.x, dy = py - b.y; const m = Math.hypot(dx, dy);
    if (m > b.r) { dx = dx / m * b.r; dy = dy / m * b.r; }

    const d = PAD.dead, nd = { ArrowLeft: dx < -d, ArrowRight: dx > d, ArrowUp: dy < -d, ArrowDown: dy > d };
    for (const k in nd) { keys[k] = nd[k]; pad.dirs[k] = nd[k]; }
  }

  canvas.addEventListener("pointerdown", (e) => {
    if (!padVisible()) return;
    const p = padPt(e);
    if (Math.hypot(p.x - PAD.base.x, p.y - PAD.base.y) <= PAD.base.r) { pad.stickId = e.pointerId; setStick(p.x, p.y); }
    else if (Math.hypot(p.x - PAD.btn.x, p.y - PAD.btn.y) <= PAD.btn.r) { pad.btnId = e.pointerId; vkeyJ(true); }
  });

  // 타이틀에서 PLAY → 인트로(타이핑+스테이지명) → 게임 시작. 다음 스테이지로는 인트로 없음.
  function startIntro(idx) {
    introTarget = (idx == null ? progress : idx); introT = 0; runScores = {}; runMax = {};
    if (!best.tutorial) { tutPage = 0; tutT = 0; state = STATE.TUTORIAL; }   // 최초: 게임 방법 먼저
    else state = STATE.INTRO;
  }
  function introProceed() { startStage(introTarget); }                       // 인트로 대사 후 스테이지 시작
  function tutAdvance() {
    Audio.sfx("button");
    if (tutPage < TUT_PAGES.length - 1) { tutPage++; tutT = 0; }
    else { best.tutorial = true; saveBest(best); introT = 0; state = STATE.INTRO; }  // 방법 안내 끝 → '나는 차가운…'
  }
  function retryStage() { startStage(stageIdx); }
  function goNextStage() {
    if (stageIdx < STAGES.length - 1) startStage(stageIdx + 1);
    else resetToMenu();
  }

  // 시드 PRNG (스테이지 idx로 고정 → 같은 스테이지는 항상 같은 맵, 스테이지마다 다른 맵)
  function rngFor(seed) {
    let s = (seed >>> 0) || 1;
    return () => { s = (s + 0x6D2B79F5) >>> 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
  }

  // 스테이지별 맵 구성: 발코니(2·3층) 위치/개수, 계단, 스팟·핫스팟 배치, 단속반, 아이템을 모두 다르게.
  function buildLayout(idx, cfg) {
    const R = rngFor(idx * 2654435761 + 12345);
    const ri = (a, b) => Math.floor(a + R() * (b - a + 1));
    const platforms = [{ x: 0, y: GROUND_Y, w: WORLD_W }];
    const stairs = [], spots = [], enforcers = [], ninjas = [], props = [];
    const E = (lane, x, min, max, speed, dir, type) => enforcers.push({
      type: type || "basic", lane, x, min, max, speed: speed * cfg.enfSpeedMul, dir,
      turnT: 0, spookT: 0, warnT: 0, embT: 0, watchT: 0, cool: 0, seeT: 0, beamAngle: R() * 6.28,
    });

    // 겹침 방지: 상호작용 오브젝트·계단의 x 점유 구간 관리(스팟·계단·공중전화·아이템·차량)
    const reserved = [];
    const occupy = (x, hw) => reserved.push({ x, hw });
    const free = (x, hw, gap = 6) => reserved.every(r => Math.abs(r.x - x) > hw + r.hw + gap);
    const findFree = (min, max, hw, gap) => { for (let t = 0; t < 30; t++) { const x = Math.round(ri(min, max)); if (free(x, hw, gap)) return x; } return null; };
    occupy(1545, 26);                                  // 공중전화

    const SLOTS = { board: 10, wall: 8, pole: 3, truck: 5, bus: 6 };
    const HW = { board: 40, wall: 64, pole: 9, truck: 47, bus: 51 };  // 스팟별 점유 반폭(전단지 가로 1.5배 반영)
    const mk = (x, y, base, kind) => { kind = kind || "board"; spots.push({ x, y, base: Math.round(base * cfg.spotMul), slots: SLOTS[kind], kind, filled: 0, p: 0, _busy: false, dogSet: new Set(), tornSet: new Set() }); occupy(x, HW[kind]); return spots[spots.length - 1]; };

    // 1) 2층 발코니 2~3개 + 계단(계단 지상 x 점유)
    const nUp = ri(2, 3), zoneW = 1440 / nUp, upper = [];
    for (let i = 0; i < nUp; i++) {
      const z0 = 120 + i * zoneW;
      const w = ri(200, Math.min(300, zoneW - 60));
      const x = Math.round(z0 + ri(20, Math.max(20, zoneW - w - 40)));
      platforms.push({ x, y: UPPER_Y, w }); upper.push({ x, w });
      const sx = Math.round(x + 16);
      stairs.push({ x: sx, w: 24, top: UPPER_Y, bottom: GROUND_Y });   // 1→2층
      occupy(sx + 12, 18);
    }
    // 2) 일부 2층 위에 3층 발코니 + 계단
    const nTop = idx >= 2 ? ri(1, 2) : (R() < 0.5 ? 1 : 0);
    const top = [];
    for (const b of [...upper].sort(() => R() - 0.5).slice(0, Math.min(nTop, upper.length))) {
      const w = Math.min(b.w - 30, ri(170, 210)); if (w < 120) continue;
      const x = Math.round(b.x + ri(8, Math.max(8, b.w - w - 8)));
      platforms.push({ x, y: TOP_Y, w }); top.push({ x, w });
      const sx = Math.round(x + w - 28);
      stairs.push({ x: sx, w: 24, top: TOP_Y, bottom: UPPER_Y });      // 2→3층
      occupy(sx + 12, 18);
    }
    // 3) 지상 스팟: 건물벽(wall) ↔ 전봇대(pole) 번갈아 — 계단·구조물과 안 겹치게
    const nG = ri(2, 3), gseg = (1450 - 150) / nG;
    for (let i = 0; i < nG; i++) {
      const kind = i % 2 === 0 ? "wall" : "pole";
      const s0 = Math.round(150 + i * gseg + 20), s1 = Math.round(150 + (i + 1) * gseg - 40);
      const x = findFree(s0, Math.max(s0 + 1, s1), HW[kind], 8);
      if (x != null) mk(x, GROUND_Y, ri(10, 15), kind);
    }
    // 발코니 스팟(게시판) — 계단 위치를 피해 배치
    for (const b of upper) { let x = Math.round(b.x + b.w / 2); if (!free(x, HW.board, 4)) x = findFree(b.x + 24, b.x + b.w - 24, HW.board, 2) || x; mk(x, UPPER_Y, ri(18, 25)); }
    for (const b of top) { let x = Math.round(b.x + b.w / 2); if (!free(x, HW.board, 4)) x = findFree(b.x + 20, b.x + b.w - 20, HW.board, 2) || x; mk(x, TOP_Y, ri(28, 36)); }
    // 3b) 주차 대형차량(트럭/버스) — 랜덤하게 전단지 스팟으로도 기능
    for (let i = 0, nVeh = ri(1, 2); i < nVeh; i++) {
      const isBus = R() < 0.5, kind = isBus ? "bus" : "truck";
      const x = findFree(240, 1360, HW[kind], 10);
      if (x == null) continue;
      if (R() < 0.55) { const sp = mk(x, GROUND_Y, ri(11, 16), kind); sp.tintv = R(); }         // 전단지 스팟
      else { props.push({ kind, x, y: GROUND_Y, tint: R() }); occupy(x, HW[kind]); }            // 장식
    }
    // 4) 단속반: 후반으로 갈수록 수·속도·종류 강화(레벨링).
    const SP = 1.0;
    E(GROUND_Y, ri(300, 900), 120, 1180, SP, R() < 0.5 ? 1 : -1);
    if (idx >= 1 || R() < 0.6) E(GROUND_Y, ri(700, 1200), 560, 1500, SP, -1);   // 2번째 지상 순찰(1스테이지만 확률)
    if (idx >= 3) E(GROUND_Y, ri(200, 1000), 80, 1400, SP, 1);                  // 3번째 순찰
    if (idx >= 6) E(GROUND_Y, ri(400, 1200), 200, WORLD_W - 100, SP, -1);       // 4번째 순찰
    for (const b of upper) E(UPPER_Y, b.x + b.w / 2, b.x + 10, b.x + b.w - 10, SP, R() < 0.5 ? 1 : -1);
    for (const b of top) { E(TOP_Y, b.x + b.w / 2, b.x + 10, b.x + b.w - 10, SP, 1); if (R() < 0.5 || idx >= 5) E(TOP_Y, b.x + b.w / 2, b.x + 10, b.x + b.w - 10, SP, -1); }
    if (idx >= 4) { const b = upper[ri(0, upper.length - 1)]; E(UPPER_Y, b.x + b.w / 2, b.x + 10, b.x + b.w - 10, SP, -1, "flash"); E(GROUND_Y, ri(300, 900), 200, 1000, SP, 1, "flash"); }  // 손전등 더 일찍
    if (idx >= 7) { const b = upper[ri(0, upper.length - 1)]; E(UPPER_Y, b.x + b.w / 2, b.x + 10, b.x + b.w - 10, SP, 1, "flash"); }   // 2번째 손전등
    if (idx >= 8) E(GROUND_Y, ri(300, 1000), 20, WORLD_W - 20, 1.2, 1, "car");  // 후반 경찰차(사방 감시)
    // 5) 아이템(상호작용 → 겹침 방지)
    const addItem = (min, max, kind) => { const x = findFree(min, max, 13, 8); if (x != null) { ninjas.push({ x, y: GROUND_Y, kind, taken: false }); occupy(x, 13); } };
    addItem(260, 700, "cloak");
    addItem(800, 1200, R() < 0.5 ? "time" : "smoke");
    if (R() < 0.6) addItem(1240, 1480, R() < 0.5 ? "smoke" : "time");

    // 6) 길거리 장식(입간판·소형차·강아지) — 스팟/구조물 회피
    const clearDeco = (x, gap) => free(x, gap, 4) && props.every(q => Math.abs(q.x - x) > gap);
    const addProp = (kind, gap) => {
      for (let t = 0; t < 16; t++) {
        const x = Math.round(ri(160, 1440));
        if (clearDeco(x, gap)) { props.push({ kind, x, y: GROUND_Y, dir: R() < 0.5 ? -1 : 1, tint: R(), phase: R() * 6.28, mstate: "idle", mtimer: 0.5 + R() * 1.5, anim: 0 }); return; }
      }
    };
    if (R() < 0.6) addProp("car", 40);                 // 소형 주차차량(장식)
    for (let i = 0, n = ri(2, 3); i < n; i++) addProp("sign", 30);
    // 강아지는 반드시 1마리 (스테이지3 입양 보장) — 배치 실패 시 빈 자리 강제 탐색
    addProp("dog", 26);
    if (!props.some(q => q.kind === "dog")) {
      let dx = 700; for (let x = 200; x <= 1320; x += 40) { if (free(x, 16, 4)) { dx = x; break; } }
      props.push({ kind: "dog", x: dx, y: GROUND_Y, dir: 1, tint: R(), phase: R() * 6.28, mstate: "idle", mtimer: 1, anim: 0 });
    }

    // 7) 코인: 스테이지당 약 50~100달러(여러 개 분산, 일부 발코니)
    const coins = [];
    for (let i = 0, nCoin = ri(5, 7); i < nCoin; i++) {
      let lane = GROUND_Y, cxp = ri(120, 1480);
      if (R() < 0.3 && upper.length) { const b = upper[ri(0, upper.length - 1)]; lane = UPPER_Y; cxp = ri(b.x + 10, b.x + b.w - 10); }
      coins.push({ x: cxp, y: lane, val: ri(10, 16), taken: false, phase: R() * 6.28 });
    }

    return { platforms, stairs, spots, enforcers, ninjas, props, coins };
  }

  // 테마별 보행자 타입 분포 (정부청사=정장, 유흥가=펑크, 대학가=백팩 등)
  const CITIZEN_POOLS = {
    alley:    ["normal", "elder", "child", "normal", "cyclist"],
    shops:    ["normal", "child", "normal", "runner", "cyclist", "normal"],
    market:   ["elder", "elder", "normal", "child", "normal"],
    campus:   ["backpack", "backpack", "backpack", "normal", "runner", "cyclist"],
    neon:     ["punk", "punk", "normal", "punk", "runner"],
    office:   ["suit", "suit", "normal", "runner", "cyclist"],
    mansion:  ["normal", "elder", "suit", "child", "normal"],
    downtown: ["suit", "normal", "runner", "cyclist", "punk", "normal"],
    gov:      ["suit", "suit", "suit", "suit", "normal", "elder"],
    bluehouse:["suit", "suit", "normal", "elder", "suit"],
  };
  const SUIT_COLORS = ["#2b3340", "#384152", "#43474f", "#30353e", "#4a4034"];
  const TIE_COLORS  = ["#c83a3a", "#2a5fb0", "#1f9d55", "#b08a1f", "#7a3aa8", "#c05a2a", "#2aa0a0", "#b03a6a"];
  const PUNK_HAIR   = ["#ff4fa3", "#37d6ff", "#b14dff", "#ffd23f", "#4dff7a", "#ff6a2a"];
  const PUNK_BODY   = ["#1c1c26", "#3a1c40", "#102a40", "#40231c", "#2a2a1c"];
  const CASUAL      = ["#5aa86a", "#3d7fb0", "#b08a3d", "#9a5aa8", "#b0563d", "#4aa0a0"];
  const CHILD_BODY  = ["#ff7a59", "#ffd23f", "#4db6ff", "#7ad17a", "#ff6fae"];
  const BAG_COLORS  = ["#c0392b", "#2c6fbb", "#2e8b57", "#8e44ad", "#d68910"];
  const rpick = (a) => a[Math.floor(Math.random() * a.length)];

  function makeCitizen(isComplainer, theme, noCycle) {
    const pool = CITIZEN_POOLS[theme] || ["normal"];
    let ctype = isComplainer ? "normal" : rpick(pool);
    if (noCycle && ctype === "cyclist") ctype = "normal";   // 한 스테이지 자전거 1인 제한
    let h = 14 + Math.floor(Math.random() * 4);
    let speed = 0.35 + Math.random() * 0.5;
    let color = isComplainer ? "#7a6a4a" : rpick(CASUAL);
    let hair = rpick(["#2b2230", "#3a2f28", "#1e1a22", "#4a3a2a"]);
    let tie = null, accent = null;
    if (!isComplainer) switch (ctype) {
      case "child":    h = 9 + Math.floor(Math.random() * 2); speed *= 1.15; color = rpick(CHILD_BODY); break;
      case "elder":    h = 13; speed *= 0.6; hair = Math.random() < 0.5 ? "#d2d2d2" : "#bfbfbf"; color = rpick(["#6a6a72", "#7a7060", "#5a6068"]); break;
      case "runner":   speed = 1.15 + Math.random() * 0.4; color = rpick(["#e8533a", "#2aa0c0", "#33b15a", "#e8a72a"]); break;
      case "cyclist":  speed = 1.3 + Math.random() * 0.5; color = rpick(["#2aa0c0", "#e8533a", "#33b15a", "#e8a72a", "#9a5aa8", "#d23a7a"]); break;
      case "suit":     color = rpick(SUIT_COLORS); tie = rpick(TIE_COLORS); hair = rpick(["#2b2230", "#3a2f28", "#1e1a22"]); break;
      case "punk":     hair = rpick(PUNK_HAIR); color = rpick(PUNK_BODY); accent = rpick(PUNK_HAIR); break;
      case "backpack": accent = rpick(BAG_COLORS); break;
    }
    return {
      x: 120 + Math.random() * (WORLD_W - 240), lane: GROUND_Y,
      dir: Math.random() < 0.5 ? -1 : 1, speed, color, hair, tie, accent, ctype, h,
      phase: Math.random() * 6.28, isComplainer,
      pauseT: Math.random() * 2, turnT: 1 + Math.random() * 3,
      speechT: 0, cool: 0, moving: true, reportT: 0, reportX: 0,
    };
  }

  function startStage(idx) {
    stageIdx = idx;
    const cfg = stageCfg(idx);
    player = {
      x: 150, y: GROUND_Y, w: 12, h: 22,   // 좌측 터치 패드(가상 D-pad)와 겹치지 않도록 우측으로 소환

      vx: 0, vy: 0, dir: 1, onGround: true, climbing: false, stair: null, attaching: 0, watchedT: 0, stunT: 0, detCool: 0, animT: 0,
    };
    const L = buildLayout(idx, cfg);
    platforms = L.platforms; stairs = L.stairs; spots = L.spots; enforcers = L.enforcers; ninjas = L.ninjas; props = L.props; coins = L.coins;
    // 고양이: 스테이지2(idx>=1)부터 1마리(흰색). 유저 근처에서 스폰 후 자유롭게 돌아다님. 30초 전엔 안 찢음.
    cats = idx >= 1 ? [{
      x: player.x + 50 + Math.random() * 50, lane: GROUND_Y, dir: Math.random() < 0.5 ? -1 : 1,
      anim: 0, target: null, actT: 1 + Math.random() * 3, done: false, moving: true,
    }] : [];
    // 강아지는 '유저의 강아지' 외엔 등장하지 않음.
    if (best.dog) {
      props = props.filter(q => q.kind !== "dog");      // 길 강아지 전부 제거 → 동료만
      companion = { x: player.x - 20, y: GROUND_Y, dir: 1, anim: 0, mstate: "idle", attachP: 0, attachSpot: null };
    } else {
      companion = null;
      if (idx < 2) props = props.filter(q => q.kind !== "dog");   // 입양 전 1~2스테이지엔 강아지 없음
      else { const dg = props.find(q => q.kind === "dog"); if (dg) dg.pettable = true; }  // 3스테이지+ 입양용 1마리만
    }
    // 시민(보행자): 모두 1층 거리를 걷는다. 일부는 '민원인'(안경 끼고 두리번). 스테이지 테마별로 타입 분포.
    citizens = [];
    const theme = STAGES[idx].theme;
    let hasCyclist = false;
    for (let i = 0; i < 12; i++) {
      const isComplainer = i < cfg.complainers;
      const c = makeCitizen(isComplainer, theme, hasCyclist);   // 이미 자전거가 있으면 추가 자전거 금지
      if (c.ctype === "cyclist") hasCyclist = true;
      citizens.push(c);
    }
    camX = 0; camY = 0;
    timeLeft = TUNE.timeStart;
    score = 0; ninjaTimer = 0; caughtFlash = 0;
    smokeT = 0; shake = 0; popups.length = 0; tearEvent = null;   // 직전 스테이지 효과 이월 방지
    calling = 0; callBonus = 0; callAllDone = false;
    penaltyT = 0; penaltyAmt = 0; penaltyMsg = "";
    msg = ""; msgT = 0; bigMsg = ""; bigT = 0;
    state = STATE.PLAYING;
    Audio.sfx("start");                    // 게임 시작 효과음
  }

  function resetToMenu() { state = STATE.MENU; }

  function flash(text) { msg = text; msgT = 1.2; }
  let bigMsg = "", bigT = 0;                 // 화면 중앙 알림(배경 패널 + 2초 페이드)
  function toast(text) { bigMsg = text; bigT = 2.0; }

  // --- 업데이트 ------------------------------------------------------------
  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;        // 프레임 스파이크 보호

    // ESC: 일시정지 토글
    if (consumePress("Escape")) {
      if (state === STATE.PLAYING) state = STATE.PAUSED;
      else if (state === STATE.PAUSED) state = STATE.PLAYING;
    }

    if (state === STATE.PLAYING) update(dt);
    else if (state === STATE.INTRO) {
      introT += dt;
      if (consumePress("Enter")) introProceed();
    } else if (state === STATE.TUTORIAL) {
      tutT += dt;
      if (consumePress("Enter")) tutAdvance();
    }
    // 음악: 타이틀류는 title, 그 외(플레이)는 game
    Audio.sync(state === STATE.MENU || state === STATE.RECORDS || state === STATE.SELECT || state === STATE.SHOP || state === STATE.NAME || state === STATE.TUTORIAL ? "title" : "game");
    render();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    const p = player;

    // 고양이 찢기 컷신 — 시간·적·플레이어 모두 정지, 고양이만 연출(단계별 진행)
    if (tearEvent) {
      const E = tearEvent; E.t -= dt; E.cat.anim += dt;
      const el = E.total - E.t;
      if (!E.removed && el >= 1.3) { removeTornSlots(); E.removed = true; }                  // 찢기 후 슬롯 제거 + 멘트 노출
      if (!E.deducted && el >= 3.1) { score = Math.max(0, score - E.lost); E.deducted = true; Audio.sfx("frustrate"); }  // -점
      if (E.t <= 0) tearEvent = null;
      return;
    }

    // 공중전화 통화 중 → 연출 후 정산으로
    if (calling > 0) {
      calling -= dt;
      if (calling <= 0) endStage();
      return;
    }

    // 행동불가('쪽팔려') 중이면 모든 조작 잠금
    if (p.stunT > 0) {
      p.stunT -= dt;
    } else if (p.attaching > 0) {        // 부착 중이면 이동 잠금
      p.attaching -= dt;
      const spot = spots.find(s => s.filled < s.slots && near(p, s) && s._busy);
      if (spot) {
        spot.p = 1 - Math.max(0, p.attaching) / TUNE.attachTime;
        if (p.attaching <= 0) finishAttach(spot);
      }
    } else {
      handleMovement(dt);
    }

    // 타이머
    timeLeft -= dt;
    if (ninjaTimer > 0) ninjaTimer -= dt;
    if (caughtFlash > 0) caughtFlash -= dt;
    if (msgT > 0) msgT -= dt;
    if (bigT > 0) bigT -= dt;
    if (penaltyT > 0) penaltyT -= dt;
    if (p.watchedT > 0) p.watchedT -= dt;
    if (p.detCool > 0) p.detCool -= dt;
    if (smokeT > 0) smokeT -= dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 14);
    for (let i = popups.length - 1; i >= 0; i--) { popups[i].t -= dt; popups[i].y -= dt * 18; if (popups[i].t <= 0) popups.splice(i, 1); }
    p.animT += dt;

    // 투명화/행동불능 중엔 안 보임. 연막 중엔 단속반 정지.
    const visible = p.attaching > 0 && ninjaTimer <= 0 && p.stunT <= 0;

    // 단속반 (연막 중엔 전부 정지·미탐지)
    for (const e of enforcers) {
      if (smokeT > 0) continue;
      if (e.cool > 0) e.cool -= dt;
      if (e.spookT > 0) e.spookT -= dt;
      if (e.type === "flash") e.beamAngle += TUNE.beamSpeed * dt;   // 빔은 항상 회전

      if (e.embT > 0) {
        e.dir = (p.x >= e.x) ? 1 : -1; e.embT -= dt;               // '난감하네요.' 정지
      } else if (e.warnT > 0) {
        e.dir = (p.x >= e.x) ? 1 : -1; e.warnT -= dt;              // 경고 정지 → 둔화+감시
        if (e.warnT <= 0) { getSpotted(); e.watchT = 3.0; }
      } else if (e.watchT > 0) {
        e.dir = (p.x >= e.x) ? 1 : -1; e.watchT -= dt;            // 둔화 후 주시
      } else if (e.turnT > 0) {
        e.turnT -= dt; if (e.turnT <= 0) e.dir = -e.dir;          // 돌아보기(기본형)
      } else {
        e.x += e.speed * e.dir;                                   // 순찰
        if (e.x < e.min) { e.x = e.min; e.dir = 1; }
        if (e.x > e.max) { e.x = e.max; e.dir = -1; }
        if (e.type === "car" && Math.random() < 0.006) e.dir = -e.dir;  // 경찰차 랜덤 횡단
      }

      if (visible && p.detCool <= 0 && e.turnT <= 0 && e.warnT <= 0 && e.embT <= 0) {
        let detects = false, blind = false;
        if (e.type === "flash") {
          // 손전등 빔: 범위 + 빔 각도 안이면 감지(상하좌우 모두)
          const dx = p.x - e.x, dy = p.y - e.lane;
          if (Math.hypot(dx, dy) < TUNE.flashRange && angDiff(Math.atan2(dy, dx), e.beamAngle) < TUNE.flashHalf) detects = true;
        } else if (e.type === "car") {
          // 경찰차: 사방 360° 반경 감지
          if (Math.hypot(p.x - e.x, p.y - e.lane) < TUNE.carRange) detects = true;
        } else {
          // 기본형: 같은 층 + 정면 시야 / 바로 뒤는 '쎄한 느낌'
          const sameLane = Math.abs(p.y - e.lane) < TUNE.visionLane;
          const dist = Math.abs(p.x - e.x);
          const ahead = (e.dir === 1) ? (p.x > e.x) : (p.x < e.x);
          if (sameLane && ahead && dist < TUNE.visionDist) detects = true;
          else if (e.cool <= 0 && sameLane && !ahead && dist < 33) blind = true;
        }

        if (blind) {
          e.spookT = 1.2; e.turnT = 0.5; e.cool = 2.5; e.seeT = 0;
        } else if (detects) {
          e.seeT = (e.seeT || 0) + dt;               // 잠깐 스친 정도로는 발각 안 됨
          if (e.seeT >= TUNE.detectDelay) {
            e.seeT = 0;
            if (p.watchedT > 0) getEmbarrassed(e);   // 둔화 중 추가 발각 → 쪽팔려, 행동불능
            else {                                    // 첫 발각 → 경고 후 둔화
              e.warnT = 1.0; e.cool = 2.5;
              p.attaching = 0;
              const sp = spots.find(s => s._busy); if (sp) { sp._busy = false; sp.p = 0; }
            }
          }
        } else {
          e.seeT = 0;                                // 시야에서 벗어나면 누적 초기화
        }
      } else if (e.seeT) {
        e.seeT = 0;
      }
    }

    // 시민(보행자) — 1층 거리를 자연스럽게 오감. 일부는 '민원인'. ('세상이 멈췄다' 중엔 전원 정지)
    // 민원인은 '부착 중인 스팟'(없으면 플레이어) 근처·같은 층을 감지 → 와이드 스팟에서도 정확히 발각.
    const busySpot = visible ? spots.find(s => s._busy) : null;
    const tcx = busySpot ? busySpot.x : (p.x + p.w / 2);
    const tcy = busySpot ? busySpot.y : p.y;
    for (const c of citizens) {
      if (smokeT > 0) continue;
      if (c.cool > 0) c.cool -= dt;
      if (c.speechT > 0) c.speechT -= dt;
      // 부착을 목격하면 '경고' 시작 → 유예시간 안에 도망 안 치면 신고(부착 지속 여부와 무관)
      const sawAttach = c.isComplainer && visible
        && Math.abs(tcx - c.x) < TUNE.complainRange
        && Math.abs(tcy - c.lane) < TUNE.visionLane;
      if (sawAttach && !c.alarmed && c.cool <= 0) {
        c.alarmed = true; c.alarmT = TUNE.reportGrace;          // 경고 카운트다운 시작
      }
      if (c.alarmed) {
        c.speechT = 0.3;                                        // 외침("여기 전단지 붙이지 마세요!") 유지
        c.alarmT -= dt;
        const dx = Math.abs((p.x + p.w / 2) - c.x);
        // 부착 지속 중이거나(와이드 스팟이라 몸이 떨어져 있어도) 근처에 머물면 '도망 안 침'
        const stillThere = sawAttach
          || (ninjaTimer <= 0 && p.stunT <= 0 && dx <= TUNE.complainRange + 18 && Math.abs(p.y - c.lane) < TUNE.visionLane + 8);
        if (!stillThere) { c.alarmed = false; c.speechT = 0; }            // 도망(투명/행동불능/멀어짐) → 신고 취소
        else if (c.alarmT <= 0) { getReported(); c.alarmed = false; c.cool = 1.2; }  // 못 도망 → 신고당함
      }
      const yelling = c.alarmed || c.speechT > 0;

      c.turnT -= dt;
      if (c.turnT <= 0) {
        c.turnT = 1.5 + Math.random() * 3;
        if (Math.random() < 0.4) c.dir = -c.dir;
        if (Math.random() < 0.3) c.pauseT = 0.6 + Math.random() * 1.6;
      }
      c.moving = c.pauseT <= 0 && !yelling;
      if (c.pauseT > 0) c.pauseT -= dt;
      else if (!yelling) c.x += c.speed * c.dir;          // 외치는 중엔 제자리(방방 뜀)
      if (c.x < 30) { c.x = 30; c.dir = 1; }
      if (c.x > WORLD_W - 30) { c.x = WORLD_W - 30; c.dir = -1; }
    }

    // 카메라 (좌우 + 위층으로 오를수록 위로도 팬)
    camX = clamp(p.x - VW / 2, 0, WORLD_W - VW);
    const targetCamY = clamp((p.y - GROUND_Y) * 0.5, -56, 0);   // 지상=0, 위층일수록 음수(위로)
    camY += (targetCamY - camY) * Math.min(1, dt * 6);          // 부드럽게 추적

    // 액션 입력(J/E): 공중전화 > 투명화 아이템 > 전단지 부착(누르면 연속)
    const action = (keys["j"] || keys["J"] || keys["e"] || keys["E"]) && p.stunT <= 0;
    const cx = p.x + p.w / 2;
    if (action) {
      if (p.onGround && Math.abs(cx - BOOTH.x) < BOOTH_R && Math.abs(p.y - BOOTH.y) < 18) {
        if (consumeAction()) startCall();
      } else {
        const item = ninjas.find(n => !n.taken && Math.abs(cx - n.x) < 16 && Math.abs(p.y - n.y) < 20);
        if (item) {
          if (consumeAction()) { item.taken = true; useItem(item.kind); }
        } else {
          const pdog = p.onGround && props.find(q => q.pettable && Math.abs(cx - q.x) < 20 && Math.abs(p.y - q.y) < 18);
          const fcat = cats && cats.find(c => !c.done && Math.abs(cx - c.x) < 22 && Math.abs(p.y - c.lane) < 18);
          if (pdog) { if (consumeAction()) petDog(pdog); }
          else if (fcat) { if (consumeAction()) feedCat(fcat); }   // 고양이에게 츄르 주기(없으면 '츄르가 없다')
          else tryAttach();
        }
      }
    }

    updateCritters(dt);                 // 길거리 강아지 모션
    updateCompanion(dt, action);        // 강아지 동료(전단지 부착 도움)
    updateCoins();                      // 코인 획득
    updateCats(dt);                     // 고양이(전단지 찢기 / 츄르)

    // 종료(시간 소진)
    if (timeLeft <= 0) { timeLeft = 0; endStage(); }
  }

  // 코인 줍기(접촉 시 자동 획득 → 지갑 누적)
  function updateCoins() {
    if (!coins) return;
    const p = player, cx = p.x + p.w / 2;
    for (const c of coins) {
      if (c.taken) continue;
      if (Math.abs(cx - c.x) < 14 && Math.abs(p.y - c.y) < 18) {
        c.taken = true; best.coins += c.val; saveBest(best);
        addPopup(c.x, c.y - 26, "+$" + c.val, "#ffd24d"); Audio.sfx("item");
      }
    }
  }

  // 고양이: 타이머 30초 전까진 배회만, 그 이후 랜덤하게 스팟 전단지를 찢음. 츄르를 주면(done) 안전.
  function updateCats(dt) {
    if (!cats || smokeT > 0) return;                    // '세상이 멈췄다' 중엔 고양이도 정지
    const canTear = timeLeft <= 30;                     // 30초 남았을 때부터 찢기 시작
    for (const c of cats) {
      c.anim += dt;
      if (c.done) { c.moving = false; continue; }        // 츄르 받은 고양이는 멈춤
      if (!c.done && canTear) {                         // 목표 스팟 탐색(랜덤 타이밍)
        if (!c.target || c.target.filled <= 0) {
          c.actT -= dt;
          if (c.actT <= 0) {
            c.actT = 3 + Math.random() * 6;             // 다음 시도까지 랜덤 간격
            const cand = spots.filter(s => s.y === GROUND_Y && s.filled > 0);
            c.target = cand.length ? cand[Math.floor(Math.random() * cand.length)] : null;
          }
        }
      } else c.target = null;
      let tx;
      if (c.target) tx = c.target.x; else { c.wt = (c.wt || 0) - dt; if (c.wt <= 0) { c.wt = 1 + Math.random() * 2; if (Math.random() < 0.5) c.dir = -c.dir; } tx = c.x + c.dir * 9999; }
      const dx = tx - c.x, dist = Math.abs(dx);
      const sp = c.target ? 0.9 : 0.5;
      if (dist > 6) { c.dir = dx > 0 ? 1 : -1; c.x = clamp(c.x + c.dir * sp, 60, WORLD_W - 60); c.moving = true; }
      else { c.moving = false; }
      // 스팟 도착 → 찢기 컷신 시작(슬롯 1~3개). 컷신 후 쿨다운 두고 또 시도(랜덤).
      if (c.target && Math.abs(c.target.x - c.x) < 16 && c.target.filled > 0) {
        // 차감 점수 300~500을 전단지 점수(base) 단위로 끊음
        const base = c.target.base || 10;
        const lo = Math.max(1, Math.ceil(300 / base)), hi = Math.max(lo, Math.floor(500 / base));
        const units = lo + Math.floor(Math.random() * (hi - lo + 1));
        // 타임라인: 0~0.3 줌인 / 0.3~1.3 찢기 / 1.3 슬롯제거+멘트 / 2.1~3.1 점선반짝 / 3.1 -점 / 3.6 종료
        tearEvent = { cat: c, spot: c.target, t: 3.6, total: 3.6, count: units, lost: units * base, removed: false, deducted: false, rects: null };
        c.moving = false; c.done = true;   // 시작 즉시 done → 한 스테이지 1회만(중복 방지)
        Audio.sfx("report");
      }
    }
  }

  // 고양이에게 츄르 주기([J]) → 만족(done), 이번 스테이지 동안 안전
  function feedCat(c) {
    if (best.churu <= 0) { toast("츄르가 없다!"); return; }
    best.churu--; saveBest(best); c.done = true; c.target = null; c.asleep = true;   // 그 자리에서 잠듦
    addPopup(c.x, c.lane - 26, "냠냠 (츄르)", "#9fe0ff"); Audio.sfx("item");
  }

  // 슬롯 i의 전단지 좌상단 좌표(월드) — drawSpot* 배치와 동일
  function slotPos(s, i) {
    if (s.kind === "wall") { const n = s.slots, pw = (n - 1) * 14 + 12 + 18, bx = s.x - pw / 2; return { fx: bx + 9 + i * 14, fy: s.y - 26 }; }
    if (s.kind === "pole") return { fx: s.x - 6, fy: s.y - 70 + 10 + i * 20 };
    if (s.kind === "truck" || s.kind === "bus") { const truck = s.kind === "truck", w = truck ? 92 : 100, h = truck ? 26 : 28, bx = s.x - w / 2, by = GROUND_Y - h - 4; return { fx: (truck ? bx + 17 : bx + 10) + i * 14, fy: by + 4 }; }
    const bx = s.x - 39, by = s.y - 52; return { fx: bx + 4 + (i % 5) * 14, fy: by + 6 + ((i / 5) | 0) * 20 };  // board
  }

  // 찢기 후 슬롯 제거(빈 슬롯). 점수 차감은 이후 단계(-점)에서. 사라진 슬롯 위치 기록(점선 반짝용).
  function removeTornSlots() {
    const E = tearEvent, s = E.spot, n = Math.min(E.count, s.filled), nf = s.filled - n;
    E.rects = [];
    for (let i = nf; i < s.filled; i++) { E.rects.push(slotPos(s, i)); s.dogSet.delete(i); s.tornSet.delete(i); }
    s.filled = nf;                                         // 붙은 전단지 사라지고 빈 슬롯
  }

  // 길거리 고양이·강아지: 천천히 걷다 → 뛰다 → 멈추다 반복(모션 다양화)
  function updateCritters(dt) {
    if (!props || smokeT > 0) return;     // '세상이 멈췄다' 중엔 길거리 동물도 정지
    for (const q of props) {
      if (q.kind !== "dog") continue;
      q.anim += dt;
      // 쓰다듬을 수 있게: 플레이어가 가까우면 강아지 멈춤
      if (q.pettable && player && Math.abs((player.x + player.w / 2) - q.x) < 24) { q.moving = false; continue; }
      q.mtimer -= dt;
      if (q.mtimer <= 0) {
        const r = Math.random();
        q.mstate = r < 0.4 ? "idle" : r < 0.8 ? "walk" : "run";
        q.mtimer = q.mstate === "idle" ? 0.6 + Math.random() * 1.8 : 0.5 + Math.random() * 1.6;
        if (Math.random() < 0.4) q.dir = -q.dir;
      }
      const base = 0.7;
      const sp = q.mstate === "idle" ? 0 : q.mstate === "walk" ? base : base * 2.4;
      if (sp > 0) {
        q.x += q.dir * sp;
        if (q.x < 80) { q.x = 80; q.dir = 1; }
        if (q.x > WORLD_W - 80) { q.x = WORLD_W - 80; q.dir = -1; }
      }
      q.moving = sp > 0;
    }
  }

  // 강아지 쓰다듬기 → 영구 동료
  function petDog(q) {
    best.dog = true; saveBest(best);
    props = props.filter(x => x !== q);
    companion = { x: q.x, y: GROUND_Y, dir: player.dir, anim: 0, mstate: "idle", attachP: 0, attachSpot: null };
    toast("강아지와 친구가 됐다!\nJ로 함께 전단지 부착");
    Audio.sfx("item");
  }

  // 강아지 동료: 캐릭터를 위아래(층)까지 동일하게 따라다님. 유저 옆 스팟에서만 함께 부착(사람의 1/4 속도). 이동속도=캐릭터.
  function updateCompanion(dt, action) {
    const d = companion; if (!d) return;
    const p = player;
    d.anim += dt;
    d.y = p.y;                                         // 위아래(층) 캐릭터와 동일
    // 유저가 닿을 수 있는(바로 옆) 스팟만 함께 부착
    const helping = (action && p.onGround) ? spots.find(s => s.filled < s.slots && near(p, s)) : null;
    const targetX = p.x - p.dir * 16;                  // 캐릭터 바로 뒤·옆
    const dx = targetX - d.x, dist = Math.abs(dx);
    if (dist > 4) { d.dir = dx > 0 ? 1 : -1; d.x = clamp(d.x + d.dir * Math.min(TUNE.moveSpeed, dist), 0, WORLD_W); d.mstate = "walk"; }
    else d.mstate = "idle";
    if (helping) {                                     // 유저 옆이면 함께 부착(개껌으로 속도 누적 상승)
      d.attachSpot = helping;
      const mult = Math.max(1, 4 - (best.chew || 0) * 0.6);  // 개껌 1개당 더 빠르게(기본 4배 느림 → 최소 1배)
      d.attachP += dt / (TUNE.attachTime * mult);
      if (d.attachP >= 1) { d.attachP = 0; if (helping.filled < helping.slots) dogFillSlot(helping); }
    } else {
      d.attachP = 0; d.attachSpot = null;
    }
  }

  // 강아지가 부착한 슬롯(발자국 표시) + 점수 가산
  function dogFillSlot(spot) {
    const idx = spot.filled;
    spot.dogSet.add(idx);
    spot.filled++;
    score += spot.base;
    Audio.sfx("attach");
    addPopup(spot.x, spot.y - 30, "+" + spot.base, "#9fe0ff");   // 강아지 도움(하늘색)
  }

  // 이번 스테이지 만점(전 슬롯 부착 점수 합) — 등급 비율 기준
  function stageMax() { return spots.reduce((a, s) => a + s.base * s.slots, 0); }
  // 점수 → 등급 (만점 대비 비율) — 더 쉽게
  function rankOf(sc) { return rankRatio(sc / Math.max(1, stageMax())); }

  function endStage() {
    if (state === STATE.SETTLE) return;
    stagePassed = score >= stageMax() * 0.25;  // B등급(만점의 25%) 이상이면 '다음 거리' 진출
    stageReward = score * 10;                  // 이번 스테이지 정산 금액(누적 없음)
    const prev = progress;
    if (stagePassed) progress = Math.min(STAGES.length - 1, Math.max(progress, stageIdx + 1));
    justUnlocked = progress > prev;      // 이번 클리어로 새 거리 최초 해금
    // 합산(누적) 점수 — 스테이지별 최고점 합산, 로컬 최고기록 갱신
    runScores[stageIdx] = Math.max(runScores[stageIdx] || 0, score);
    runMax[stageIdx] = stageMax();
    const total = sumVals(runScores), totalMax = sumVals(runMax);
    if (total > best.t) { best.t = total; best.r = rankRatio(total / Math.max(1, totalMax)); }
    best.life += stageReward;                              // 평생 총 정산액 누적
    best.stage = Math.max(best.stage, progress + 1);       // 최고 도달 스테이지
    best.stageEarn[stageIdx] = Math.max(best.stageEarn[stageIdx] || 0, stageReward);  // 스테이지별 최고 수익
    saveBest(best);
    pushScore();                           // 온라인 랭킹에 내 기록 업로드
    state = STATE.SETTLE;
    Audio.sfx("complete");                 // 게임 완료 효과음
  }

  function consumeAction() {
    return consumePress("j") || consumePress("J") || consumePress("e") || consumePress("E");
  }

  // 공중전화로 고용주와 통화 → 게임 완료. 전 슬롯 완료 시 잔여시간 보너스.
  function startCall() {
    if (calling > 0) return;
    player.attaching = 0;
    callAllDone = spots.every(s => s.filled >= s.slots);
    callBonus = callAllDone ? Math.round(Math.max(0, timeLeft) * TUNE.timeBonusPerSec) : 0;
    score += callBonus;
    calling = TUNE.callTime;
    Audio.sfx("call");
  }

  // 아이템 사용
  function useItem(kind) {
    const cx = player.x + player.w / 2;
    if (kind === "time") { timeLeft += TUNE.timeAdd; addPopup(cx, player.y - 30, "+" + TUNE.timeAdd + "초", "#7fffd4"); }
    else if (kind === "smoke") { smokeT = TUNE.smokeTime; flash("세상이 멈췄다!"); }
    else { ninjaTimer = TUNE.ninjaDuration; flash("닌자화! " + TUNE.ninjaDuration + "초"); }
    Audio.sfx("item");
  }

  function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0.9 }); }

  function handleMovement(dt) {
    const p = player;
    const left = keys["ArrowLeft"] || keys["a"] || keys["A"];
    const right = keys["ArrowRight"] || keys["d"] || keys["D"];
    const up = keys["ArrowUp"] || keys["w"] || keys["W"];
    const down = keys["ArrowDown"] || keys["s"] || keys["S"];

    // 좌우 ('눈치보는 중'이면 속도 절반)
    const spd = TUNE.moveSpeed * (p.watchedT > 0 ? TUNE.watchedSlow : 1);
    p.vx = 0;
    if (left)  { p.vx = -spd; p.dir = -1; }
    if (right) { p.vx =  spd; p.dir =  1; }

    // 계단(사다리) — 현재 층과 맞는 계단을 골라 오르내림. 같은 x에 계단 2개여도 층으로 구분.
    const cx = p.x + p.w / 2;
    const inZone = (s) => cx > s.x - 3 && cx < s.x + s.w + 3;
    if (!p.climbing && p.onGround) {
      if (up)        p.stair = stairs.find(s => inZone(s) && Math.abs(p.y - s.bottom) < 6);   // 아래층→위
      else if (down) p.stair = stairs.find(s => inZone(s) && Math.abs(p.y - s.top) < 6);      // 위층→아래
      else p.stair = null;
      if (p.stair) p.climbing = true;
    }

    if (p.climbing) {
      const s = p.stair;
      if (!s || !inZone(s)) {        // 계단을 벗어나면 낙하로 전환
        p.climbing = false; p.stair = null;
      } else {
        p.vy = 0; p.onGround = false;
        if (up)   p.y -= TUNE.climbSpeed;
        if (down) p.y += TUNE.climbSpeed;
        p.x += p.vx;
        p.x = clamp(p.x, 0, WORLD_W - p.w);
        if (p.y <= s.top)         { p.y = s.top;    p.climbing = false; p.stair = null; p.onGround = true; }
        else if (p.y >= s.bottom) { p.y = s.bottom; p.climbing = false; p.stair = null; p.onGround = true; }
        else return;             // 계단 중간 — 중력 적용 없이 종료
      }
    }


    // 중력 + 착지
    const prevFeet = p.y;
    p.vy += TUNE.gravity;
    p.y += p.vy;
    p.onGround = false;
    for (const pl of platforms) {
      const overX = (p.x + p.w / 2) > pl.x && (p.x + p.w / 2) < pl.x + pl.w;
      if (overX && p.vy >= 0 && prevFeet <= pl.y + 1 && p.y >= pl.y) {
        p.y = pl.y; p.vy = 0; p.onGround = true;
      }
    }
    if (p.y > GROUND_Y) { p.y = GROUND_Y; p.vy = 0; p.onGround = true; }

    p.x += p.vx;
    p.x = clamp(p.x, 0, WORLD_W - p.w);
  }

  function tryAttach() {
    const p = player;
    if (p.attaching > 0 || !p.onGround) return;
    const spot = spots.find(s => s.filled < s.slots && near(p, s));
    if (spot) {                       // 투명화 중에도 부착 시간은 동일
      spot._busy = true;
      p.attaching = TUNE.attachTime;
      spot.p = 0;
    }
  }

  function finishAttach(spot) {
    spot.filled++; spot._busy = false; spot.p = 0; player.attaching = 0;
    score += spot.base;
    Audio.sfx("attach");                                   // 띠링 효과음(흔들림 제거)
    addPopup(spot.x, spot.y - 36, "+" + spot.base, spot.base >= 18 ? "#ffd24d" : "#fff");
  }

  // 점수 차감 + 화면 중앙 빨간 표시 (감점은 고정 표기: -100 / -50)
  function losePoints(amt, centerMsg) {
    score = Math.max(0, score - amt);
    penaltyAmt = amt;
    penaltyMsg = centerMsg || "";
    penaltyT = 1.4;
    caughtFlash = 0.8;
    shake = Math.max(shake, 6);                            // 발각 손맛(큰 흔들림)
  }

  // 단속반에게 단속 → 100점 차감 + '눈치보는 중'(5초 둔화)
  function getSpotted() {
    if (player.watchedT > 0 || player.stunT > 0) return;
    player.watchedT = TUNE.watchedTime;
    player.detCool = 0.8;                  // 잠깐의 유예(둔화 직후 즉시 재발각 방지)
    player.attaching = 0;
    const sp = spots.find(s => s._busy); if (sp) { sp._busy = false; sp.p = 0; }
    losePoints(TUNE.spotPenalty); Audio.sfx("catch");
  }

  // 둔화 중 추가 발각 → 단속반 '난감하네요.' + 화면중앙 '쪽팔려...' + 5초 행동불능
  function getEmbarrassed(e) {
    if (player.stunT > 0) return;
    e.embT = 1.2; e.watchT = 0;
    player.stunT = TUNE.embarrassTime;
    player.watchedT = 0;
    player.attaching = 0;
    const sp = spots.find(s => s._busy); if (sp) { sp._busy = false; sp.p = 0; }
    losePoints(TUNE.spotPenalty); Audio.sfx("catch");      // -100 (쪽팔려 메시지는 stunT 동안 HUD에 표시)
  }

  // 민원인에게 신고당함 → 50점 차감 + "신고당했다..." 전체 메시지
  function getReported() {
    losePoints(TUNE.reportPenalty, "신고당했다..."); Audio.sfx("report");
  }

  function near(p, s) {
    const hw = s.kind === "wall" ? 66 : s.kind === "pole" ? 18 : s.kind === "truck" ? 47 : s.kind === "bus" ? 51 : s.kind === "board" ? 40 : 22;
    return Math.abs((p.x + p.w / 2) - s.x) < hw && Math.abs(p.y - s.y) < 16;
  }

  // 떠오르는 점수 팝업(월드 좌표)
  function drawPopups() {
    ctx.textAlign = "center"; ctx.font = "bold 9px Galmuri11, monospace";
    for (const u of popups) {
      ctx.globalAlpha = Math.min(1, u.t / 0.9);
      ctx.fillStyle = "#000"; ctx.fillText(u.text, u.x + 1, u.y + 1);
      ctx.fillStyle = u.color; ctx.fillText(u.text, u.x, u.y);
    }
    ctx.globalAlpha = 1;
  }

  // 연막 오버레이(화면 좌표)
  function drawSmokeOverlay() {
    ctx.fillStyle = `rgba(205,205,210,${0.16 + Math.sin(performance.now() / 200) * 0.04})`;
    ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = "center"; ctx.fillStyle = "#445"; ctx.font = "bold 9px Galmuri11, monospace";
    ctx.fillText("연막 — 단속반 정지 " + smokeT.toFixed(1) + "s", VW / 2, 18);
  }

  // 모바일 가상 컨트롤 렌더(화면 좌표) — 반투명 흰 원형 D-pad(솔리드 화이트 화살표) + 반투명 레드 버튼
  function triPts(cx, cy, dir) {
    const w = 7, h = 6;
    if (dir === "up") return [[cx, cy - h], [cx + w, cy + h], [cx - w, cy + h]];
    if (dir === "down") return [[cx - w, cy - h], [cx + w, cy - h], [cx, cy + h]];
    if (dir === "left") return [[cx - h, cy], [cx + w, cy - w], [cx + w, cy + w]];
    return [[cx + h, cy], [cx - w, cy - w], [cx - w, cy + w]];           // right
  }
  function fillTri(pts, color) { ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); ctx.lineTo(pts[1][0], pts[1][1]); ctx.lineTo(pts[2][0], pts[2][1]); ctx.closePath(); ctx.fill(); }
  function drawPadArrow(cx, cy, dir, dep, pressed) {
    if (pressed) { fillTri(triPts(cx, cy + dep, dir), "#e6e9ef"); }       // 눌림: 면이 두께만큼 내려가고 옆면 사라짐
    else { fillTri(triPts(cx, cy + dep, dir), "rgba(120,128,140,0.85)"); fillTri(triPts(cx, cy, dir), "#ffffff"); }
  }
  function mobile() { return TOUCH || window.FORCE_PAD; }
  // 상호작용 표기용 — 작은 초록색 원
  function drawGreenKey(x, y, R) {
    ctx.fillStyle = "#5ce884"; ctx.beginPath(); ctx.arc(x, y, R, 0, 7); ctx.fill();
  }
  // 머리 위 상호작용 표기(모바일): 원은 오브젝트 위 여백을 두고 '고정',
  // 범위 안이면 그 원 '위로' 라벨이 뜬다(원 위치 불변).
  function mobilePrompt(cx, topY, label, near) {
    const R = 3.5, gap = 7;             // 오브젝트와 원 사이 여백
    const cy = topY - gap;
    drawGreenKey(cx, cy, R);
    if (near && label) {
      ctx.font = "bold 8px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      const ly = cy - R - 4, txt = "[" + label + "]";   // 원 위로 라벨([ ]로 감쌈)
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(txt, cx + 0.5, ly + 0.5);
      ctx.fillStyle = "#fff"; ctx.fillText(txt, cx, ly);
    }
  }
  function drawTouchPad() {
    const B = PAD.base, BT = PAD.btn;
    // 좌측 원형 베이스 (반투명 흰, 가장자리 선 1px)
    ctx.fillStyle = "rgba(255,255,255,0.16)"; ctx.beginPath(); ctx.arc(B.x, B.y, B.r, 0, 7); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(B.x, B.y, B.r - 0.5, 0, 7); ctx.stroke();
    if (pad.vec) { ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(B.x + pad.vec.dx, B.y + pad.vec.dy, 12, 0, 7); ctx.fill(); }   // 엄지 위치
    const aR = PAD.arrowR, dep = 2;
    drawPadArrow(B.x, B.y - aR, "up", dep, pad.dirs.ArrowUp);
    drawPadArrow(B.x, B.y + aR, "down", dep, pad.dirs.ArrowDown);
    drawPadArrow(B.x - aR, B.y, "left", dep, pad.dirs.ArrowLeft);
    drawPadArrow(B.x + aR, B.y, "right", dep, pad.dirs.ArrowRight);
    // 우측 버튼 (반투명 레드, 선 없음, 두께, 눌림)
    const pressedB = !!pad.btnId, bdep = 3, drop = pressedB ? bdep : 0;
    if (!pressedB) { ctx.fillStyle = "rgba(30,120,64,0.5)"; ctx.beginPath(); ctx.arc(BT.x, BT.y + bdep, BT.r, 0, 7); ctx.fill(); }   // 옆면(짙은 초록)
    ctx.fillStyle = "rgba(92,232,132,0.5)"; ctx.beginPath(); ctx.arc(BT.x, BT.y + drop, BT.r, 0, 7); ctx.fill();                   // 윗면(밝은 초록 반투명)
    ctx.strokeStyle = "rgba(235,255,240,0.8)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(BT.x, BT.y + drop, BT.r - 0.75, 0, 7); ctx.stroke();   // 가장자리 선
  }

  // --- 렌더 ----------------------------------------------------------------
  function render() {
    ctx.clearRect(0, 0, VW, VH);
    if (state === STATE.NAME) return renderName();
    if (state === STATE.MENU) return renderMenu();
    if (state === STATE.RECORDS) return renderRecords();
    if (state === STATE.SELECT) return renderSelect();
    if (state === STATE.SHOP) return renderShop();
    if (state === STATE.INTRO) return renderIntro();
    if (state === STATE.TUTORIAL) return renderTutorial();

    if (tearEvent) {                       // === 고양이 찢기 컷신: 고양이 + 대상 스팟만 ===
      const E = tearEvent, el = E.total - E.t, s = E.spot;
      ctx.fillStyle = "#0a0c14"; ctx.fillRect(0, 0, VW, VH);   // 나머지 오브젝트 숨김(단색 배경)
      ctx.save();
      const fx = s ? s.x : E.cat.x, fy = s ? s.y - 24 : E.cat.lane - 8;
      const Z = 1 + 1.0 * clamp(el / 0.3, 0, 1);              // 0.3초간 줌인 → 최대 확대 유지
      ctx.translate(VW / 2, VH / 2 + 40); ctx.scale(Z, Z); ctx.translate(-fx, -fy);  // 스팟을 40px 아래로(라벨과 간격)
      if (s) drawSpotOne(s);                                  // (찢긴 뒤엔 빈 슬롯)
      if (E.rects && el >= 2.1 && el < 3.1 && Math.floor(el * 8) % 2 === 0) {   // 사라진 슬롯 점선 반짝(1초)
        ctx.save(); ctx.setLineDash([2, 2]); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;
        for (const r of E.rects) ctx.strokeRect(r.fx + 0.5, r.fy + 0.5, 12, 18);
        ctx.setLineDash([]); ctx.restore();
      }
      drawCats();                                             // 고양이(뒷모습 찢기)
      ctx.restore();
      // (HUD 등 컷신 외 요소는 노출하지 않음 — 컷신 텍스트/오브젝트만)
      // 멘트 시퀀스: 먼저 '찢었습니다!' → (점선 반짝) → '-점'
      if (el >= 1.3) {
        ctx.textAlign = "center"; ctx.fillStyle = "#ffd24d"; ctx.font = "12px Galmuri11, monospace";
        ctx.fillText("붙인 전단지를 고양이가 찢었습니다!", VW / 2, 40);
        if (el >= 3.1) { ctx.fillStyle = "#fff"; ctx.font = "bold 16px Galmuri11, monospace"; ctx.fillText("-" + E.lost + "점", VW / 2, 62); }
      }
      return;
    }

    drawBackground();
    ctx.save();
    const sx = shake > 0 ? (Math.random() * 2 - 1) * shake : 0;
    const sy = shake > 0 ? (Math.random() * 2 - 1) * shake : 0;
    ctx.translate(-camX + sx, -(camY || 0) + sy);

    drawPlatforms();
    drawStairs();          // 발코니 벽 위에 그려야 가려지지 않음
    drawProps();           // 길거리 장식(차량·입간판) — 스팟 뒤
    drawSpots();
    drawCoins();           // 코인
    drawStreetDogs();      // 길거리 강아지 — 스팟보다 앞 뎁스
    drawCats();            // 고양이(전단지 찢기)
    drawBooth();
    drawNinjas();
    drawCitizens();        // 민원인·단속반은 스팟보다 위(앞) 뎁스
    drawEnforcers();
    drawCompanion();       // 강아지 동료
    drawPlayer();
    drawPopups();
    drawSpotPins();        // 장소 핀은 최상단 뎁스

    ctx.restore();
    if (smokeT > 0) drawSmokeOverlay();
    drawHUD();
    if (padVisible()) drawTouchPad();
    if (state === STATE.SETTLE) renderSettle();
    if (state === STATE.PAUSED) renderPause();
  }

  // 패럴랙스 타일링: spacing 간격으로 화면을 덮으며 fn(screenX) 호출
  function tileX(spacing, factor, fn) {
    let off = (camX * factor) % spacing; if (off < 0) off += spacing;
    for (let sx = -off - spacing; sx < VW + spacing; sx += spacing) fn(sx);
  }
  // [최적화] 월드좌표 x가 현재 화면(±m)에 보이는지
  function vis(x, m) { return x >= camX - m && x <= camX + VW + m; }
  // [최적화] step 격자 패턴을 보이는 구간만 반복하기 위한 [시작x, 끝x] (격자 위상 유지)
  function tileRange(px, pw, step) {
    const x0 = px + Math.max(0, Math.floor((camX - 24 - px) / step)) * step;
    return [x0, Math.min(px + pw, camX + VW + 24)];
  }

  // 정적 하늘(그라데이션 + 천체)을 오프스크린에 1회 렌더 → 캐시
  function renderSkyCache(S) {
    const c = sctx;
    const g = c.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, S.sky[0]); g.addColorStop(1, S.sky[1]);
    c.fillStyle = g; c.fillRect(0, 0, VW, VH);
    const dark = S.time === "night" || S.time === "dusk";
    const warmLow = S.time === "dawn" || S.time === "sunset";
    if (dark) {
      c.fillStyle = "rgba(255,255,255,0.5)";
      for (let i = 0; i < 28; i++) c.fillRect(i * 97 % VW, i * 53 % 90, 1, 1);
      c.fillStyle = "#f4f0d0"; c.beginPath(); c.arc(410, 46, 15, 0, 7); c.fill();
    } else if (warmLow) {
      const sy = 120, sun = S.time === "dawn" ? "#ffd0b0" : "#ff9a4a";
      const gg = c.createRadialGradient(360, sy, 8, 360, sy, 90);
      gg.addColorStop(0, S.time === "dawn" ? "rgba(255,200,170,0.35)" : "rgba(255,140,60,0.4)");
      gg.addColorStop(1, "rgba(255,140,60,0)");
      c.fillStyle = gg; c.fillRect(270, 30, 180, 130);
      c.fillStyle = sun; c.beginPath(); c.arc(360, sy, 18, 0, 7); c.fill();
    } else {
      const gg = c.createRadialGradient(430, 40, 6, 430, 40, 60);
      gg.addColorStop(0, "rgba(255,250,220,0.55)"); gg.addColorStop(1, "rgba(255,250,220,0)");
      c.fillStyle = gg; c.fillRect(370, 0, 120, 100);
      c.fillStyle = "#fff6da"; c.beginPath(); c.arc(430, 40, 14, 0, 7); c.fill();
      c.fillStyle = "rgba(255,255,255,0.5)";
      c.fillRect(80, 34, 60, 9); c.fillRect(96, 28, 36, 9); c.fillRect(250, 50, 50, 8);
    }
  }

  function drawBackground() {
    const S = STAGES[stageIdx];
    if (skyStage !== stageIdx) { renderSkyCache(S); skyStage = stageIdx; }   // 스테이지 바뀔 때만 재생성
    ctx.drawImage(skyCanvas, 0, 0, VW, VH);

    // 원경 건물 + 테마 배경물은 약간 어둡게(뒤로 물러나게)
    if (FILTER_OK) ctx.filter = "brightness(0.78)";
    // 원경 건물 (테마별 높이/폭)
    const tall = S.theme === "office" || S.theme === "downtown";
    const bw = tall ? 44 : 56, sp = bw + 14, base = tall ? 92 : 52, vary = tall ? 70 : 44;
    let k = 0;
    tileX(sp, 0.3, (sx) => {
      const bh = base + ((k * 37) % vary); k++;
      ctx.fillStyle = S.far; ctx.fillRect(sx, VH - bh, bw, bh);
      ctx.fillStyle = S.win;
      for (let wy = VH - bh + 8; wy < VH - 10; wy += 12)
        for (let wx = sx + 6; wx < sx + bw - 6; wx += 10) ctx.fillRect(wx, wy, 4, 5);
      if (!FILTER_OK) { ctx.fillStyle = DIM78; ctx.fillRect(sx, VH - bh, bw, bh); }   // filter 미지원 폴백
    });

    drawThemeAccents(S.theme);
    if (FILTER_OK) ctx.filter = "none";
  }

  // 스테이지 타이틀에 맞는 시그니처 배경 그래픽 (패럴랙스 0.45)
  function drawThemeAccents(theme) {
    const hz = VH - 24;                  // 원경 지면 기준선
    switch (theme) {
      case "alley":                      // 전봇대 + 전선
        tileX(150, 0.45, (sx) => {
          ctx.fillStyle = "#15151f"; ctx.fillRect(sx + 30, hz - 60, 3, 60);
          ctx.fillRect(sx + 22, hz - 56, 19, 2);
          ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(sx + 31, hz - 54); ctx.quadraticCurveTo(sx + 105, hz - 44, sx + 180, hz - 54); ctx.stroke();
        });
        break;
      case "shops":                      // 알록달록 상점 간판
        tileX(64, 0.45, (sx) => {
          const cols = ["#e85d75", "#5db0e8", "#e8c45d", "#7de87d"];
          ctx.fillStyle = cols[Math.floor((sx + 2000) / 64) % 4];
          ctx.fillRect(sx + 8, hz - 26, 44, 9);
          ctx.fillStyle = "rgba(255,255,255,0.25)"; ctx.fillRect(sx + 8, hz - 26, 44, 2);
        });
        break;
      case "market":                     // 천막(차양) 줄무늬
        tileX(54, 0.45, (sx) => {
          for (let i = 0; i < 5; i++) { ctx.fillStyle = i % 2 ? "#d24b4b" : "#efe4d0"; ctx.fillRect(sx + 6 + i * 9, hz - 16, 9, 10); }
          ctx.fillStyle = "#6a4a2a"; ctx.fillRect(sx + 4, hz - 18, 47, 2);
        });
        break;
      case "campus":                     // 시계탑 + 현수막
        tileX(260, 0.45, (sx) => {
          ctx.fillStyle = "#3a2f2a"; ctx.fillRect(sx + 40, hz - 90, 26, 90);          // 탑
          ctx.fillStyle = "#5a4a40"; ctx.fillRect(sx + 36, hz - 98, 34, 10);
          ctx.fillStyle = "#efe9d0"; ctx.beginPath(); ctx.arc(sx + 53, hz - 70, 6, 0, 7); ctx.fill();  // 시계
          ctx.fillStyle = "#1e3a6e"; ctx.fillRect(sx + 100, hz - 50, 8, 30);          // 현수막
        });
        break;
      case "neon":                       // 네온 사인 (글로우)
        tileX(96, 0.45, (sx) => {
          const cols = ["255,62,165", "62,230,255", "255,226,62"];
          const c = cols[Math.floor((sx + 3000) / 96) % 3];
          const bx = sx + 44, top = hz - 96 + ((Math.floor(sx) % 30)), h = 64;
          const gg = ctx.createRadialGradient(bx + 2, top + h / 2, 2, bx + 2, top + h / 2, 30);
          gg.addColorStop(0, `rgba(${c},0.5)`); gg.addColorStop(1, `rgba(${c},0)`);
          ctx.fillStyle = gg; ctx.fillRect(bx - 28, top - 10, 60, h + 20);
          ctx.fillStyle = `rgba(${c},0.9)`; ctx.fillRect(bx, top, 5, h);
        });
        break;
      case "office":                     // 유리 타워 하이라이트
        tileX(120, 0.3, (sx) => {
          ctx.fillStyle = "rgba(150,200,255,0.10)"; ctx.fillRect(sx + 30, hz - 130, 40, 130);
          ctx.fillStyle = "rgba(180,220,255,0.18)"; ctx.fillRect(sx + 30, hz - 130, 6, 130);
        });
        break;
      case "mansion":                    // 박공지붕 저택 + 담장
        tileX(150, 0.45, (sx) => {
          ctx.fillStyle = "#2a2f40"; ctx.fillRect(sx + 30, hz - 46, 70, 46);
          ctx.beginPath(); ctx.moveTo(sx + 26, hz - 46); ctx.lineTo(sx + 65, hz - 66); ctx.lineTo(sx + 104, hz - 46); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "rgba(255,225,150,0.3)"; ctx.fillRect(sx + 56, hz - 30, 12, 14);  // 따뜻한 창
          ctx.fillStyle = "#1d2230"; ctx.fillRect(sx, hz - 14, 30, 14);                      // 담장
        });
        break;
      case "downtown":                   // 초고층 + 항공장애등(깜빡)
        tileX(80, 0.3, (sx) => {
          const blink = Math.floor(performance.now() / 600 + sx) % 2;
          ctx.fillStyle = "#0f1626"; ctx.fillRect(sx + 20, hz - 150, 40, 150);
          ctx.fillStyle = blink ? "#ff4040" : "#7a2020"; ctx.fillRect(sx + 38, hz - 154, 3, 3);
        });
        break;
      case "gov":                        // 기둥 있는 관청 + 태극기
        tileX(300, 0.45, (sx) => {
          ctx.fillStyle = "#3a3a44"; ctx.fillRect(sx + 30, hz - 70, 130, 70);
          ctx.fillStyle = "#2a2a33"; ctx.beginPath(); ctx.moveTo(sx + 24, hz - 70); ctx.lineTo(sx + 95, hz - 88); ctx.lineTo(sx + 166, hz - 70); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "#52525e"; for (let i = 0; i < 6; i++) ctx.fillRect(sx + 40 + i * 20, hz - 64, 6, 64);  // 기둥
          ctx.fillStyle = "#ddd"; ctx.fillRect(sx + 95, hz - 110, 1, 24);                 // 깃대
          ctx.fillStyle = "#eee"; ctx.fillRect(sx + 96, hz - 110, 16, 10);                // 태극기(흰 바탕)
          ctx.fillStyle = "#c83a2a"; ctx.fillRect(sx + 102, hz - 108, 4, 3);
          ctx.fillStyle = "#1e3a6e"; ctx.fillRect(sx + 102, hz - 105, 4, 3);
        });
        break;
      case "bluehouse":                  // 청기와 본관
        tileX(420, 0.45, (sx) => {
          const bx = sx + 120, bw2 = 150;
          ctx.fillStyle = "#243a52"; ctx.fillRect(bx, hz - 56, bw2, 56);                  // 본채
          ctx.fillStyle = "#3a6ea5"; ctx.beginPath();                                      // 청기와 지붕
          ctx.moveTo(bx - 14, hz - 56); ctx.lineTo(bx + bw2 / 2, hz - 84); ctx.lineTo(bx + bw2 + 14, hz - 56); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "#5a93cf"; ctx.fillRect(bx - 14, hz - 58, bw2 + 28, 3);
          ctx.fillStyle = "rgba(255,235,180,0.35)";                                        // 창
          for (let wx = bx + 14; wx < bx + bw2 - 10; wx += 22) ctx.fillRect(wx, hz - 40, 12, 22);
        });
        break;
    }
  }

  function drawPlatforms() {
    const P = STAGES[stageIdx].pal, theme = STAGES[stageIdx].theme;
    for (const pl of platforms) {
      const isGround = pl.y === GROUND_Y;
      if (isGround) {
        ctx.fillStyle = P.gnd; ctx.fillRect(pl.x, pl.y, pl.w, VH - pl.y);
        ctx.fillStyle = P.gtop; ctx.fillRect(pl.x, pl.y, pl.w, 4);
        // 바닥 무늬(테마별)
        if (theme === "downtown") {                         // 차선
          ctx.fillStyle = P.tile; const [a, b] = tileRange(pl.x, pl.w, 28); for (let x = a; x < b; x += 28) ctx.fillRect(x, pl.y + 16, 14, 3);
        } else if (theme === "bluehouse") {                 // 레드카펫
          ctx.fillStyle = P.tile; ctx.fillRect(pl.x, pl.y + 4, pl.w, 10);
          ctx.fillStyle = "rgba(255,220,120,0.3)"; ctx.fillRect(pl.x, pl.y + 4, pl.w, 1); ctx.fillRect(pl.x, pl.y + 13, pl.w, 1);
        } else if (theme === "market") {                    // 시장 멍석 패턴
          ctx.fillStyle = P.tile; const [a, b] = tileRange(pl.x, pl.w, 8); for (let x = a; x < b; x += 8) ctx.fillRect(x, pl.y + 6, 4, 3);
        } else if (theme === "neon") {                       // 젖은 노면 반사 줄
          ctx.fillStyle = "rgba(120,220,255,0.06)"; const [a, b] = tileRange(pl.x, pl.w, 6); for (let x = a; x < b; x += 6) ctx.fillRect(x, pl.y + 6, 1, VH - pl.y - 8);
        } else {                                             // 보도블럭
          ctx.fillStyle = P.tile; const [a, b] = tileRange(pl.x, pl.w, 16); for (let x = a; x < b; x += 16) ctx.fillRect(x, pl.y + 6, 14, 2);
        }
      } else {
        // 2층 발코니 + 건물 벽
        ctx.fillStyle = P.wall; ctx.fillRect(pl.x, pl.y, pl.w, GROUND_Y - pl.y);
        ctx.fillStyle = P.ledge; ctx.fillRect(pl.x, pl.y, pl.w, 4);
        // 난간(청와대는 청기와 처마 느낌으로 더 두껍게)
        if (theme === "bluehouse") {
          ctx.fillStyle = P.ledge; ctx.fillRect(pl.x - 2, pl.y - 6, pl.w + 4, 6);
        } else {
          ctx.fillStyle = P.ledge;
          for (let x = pl.x + 4; x < pl.x + pl.w - 2; x += 10) ctx.fillRect(x, pl.y - 8, 2, 8);
          ctx.fillRect(pl.x + 2, pl.y - 9, pl.w - 4, 2);
        }
        // 창문
        ctx.fillStyle = P.win2;
        for (let x = pl.x + 12; x < pl.x + pl.w - 10; x += 30) ctx.fillRect(x, pl.y + 16, 16, 22);
      }
    }
    // 조명(테마별) — 낮/아침엔 소등
    const lit = !(STAGES[stageIdx].time === "day" || STAGES[stageIdx].time === "morning");
    for (const lx of [140, 600, 1060, 1520]) drawLight(lx, P.lamp, P.glow, lit);
  }

  // 테마별 가로 조명. lit=false면 소등(빛무리 없음, 전구 회색)
  function drawLight(x, type, glow, lit) {
    const gy = GROUND_Y;
    const bulb = lit ? `rgba(${glow},0.9)` : "#6a6a72";
    const halo = (cx, cy, r, a) => {
      if (!lit) return;
      const g = ctx.createRadialGradient(cx, cy, 3, cx, cy, r);
      g.addColorStop(0, `rgba(${glow},${a})`); g.addColorStop(1, `rgba(${glow},0)`);
      ctx.fillStyle = g; ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    };
    if (type === "neon") {                       // 세로 네온 사인
      const on = !lit || Math.floor(performance.now() / 300 + x) % 2;
      halo(x + 2, gy - 60, 54, on ? 0.30 : 0.16);
      ctx.fillStyle = lit ? `rgba(${glow},0.95)` : "#444"; ctx.fillRect(x, gy - 92, 5, 60);
      ctx.fillStyle = "#222"; ctx.fillRect(x - 1, gy - 32, 7, 32);
    } else if (type === "lantern" || type === "lanternB") {   // 매달린 등불
      ctx.fillStyle = "#3a2a1a"; ctx.fillRect(x, gy - 80, 3, 22);
      const c = type === "lanternB" ? "180,210,255" : "255,150,60";
      halo(x + 1, gy - 56, 40, 0.26);
      ctx.fillStyle = lit ? `rgba(${c},0.95)` : "#7a6a5a"; ctx.fillRect(x - 6, gy - 64, 14, 14);
      ctx.fillStyle = "#1a0f08"; ctx.fillRect(x - 6, gy - 64, 14, 2); ctx.fillRect(x - 6, gy - 52, 14, 2);
    } else if (type === "fluoro") {              // 키 큰 형광 가로등(차가움)
      ctx.fillStyle = "#555"; ctx.fillRect(x, gy - 96, 3, 96);
      ctx.fillStyle = "#888"; ctx.fillRect(x - 10, gy - 98, 24, 4);
      ctx.fillStyle = bulb; ctx.fillRect(x - 9, gy - 96, 22, 3);
      halo(x + 2, gy - 80, 64, 0.16);
    } else if (type === "flood") {               // 관청 플러드라이트
      ctx.fillStyle = "#555"; ctx.fillRect(x, gy - 64, 4, 64);
      ctx.fillStyle = "#999"; ctx.fillRect(x - 5, gy - 70, 16, 8);
      ctx.fillStyle = bulb; ctx.fillRect(x - 3, gy - 66, 10, 3);
      halo(x + 2, gy - 60, 70, 0.14);
    } else if (type === "garden") {              // 정원등(낮고 따뜻)
      ctx.fillStyle = "#3a3a30"; ctx.fillRect(x, gy - 30, 3, 30);
      ctx.fillStyle = bulb; ctx.fillRect(x - 3, gy - 36, 9, 7);
      halo(x + 1, gy - 30, 40, 0.22);
    } else {                                     // street / coolst / brightst (기둥형 가로등)
      const a = type === "brightst" ? 0.28 : 0.20, r = type === "brightst" ? 72 : 60;
      ctx.fillStyle = "#444"; ctx.fillRect(x, gy - 70, 4, 70);
      ctx.fillStyle = "#666"; ctx.fillRect(x - 8, gy - 74, 20, 6);
      ctx.fillStyle = bulb; ctx.fillRect(x - 4, gy - 72, 12, 4);
      halo(x + 2, gy - 60, r, a);
    }
  }

  function drawStairs() {     // 사다리
    for (const s of stairs) {
      const cx = s.x + s.w / 2, railGap = 21;         // 두 기둥 간격(너비 1.5배)
      const lx = cx - railGap / 2, rx = cx + railGap / 2;
      // 기둥 2개
      ctx.fillStyle = "#8a7a52"; ctx.fillRect(lx - 1, s.top, 2, s.bottom - s.top); ctx.fillRect(rx - 1, s.top, 2, s.bottom - s.top);
      ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(lx, s.top, 1, s.bottom - s.top);     // 음영
      // 발판(가로대)
      ctx.fillStyle = "#b39a5e";
      for (let y = s.top + 4; y < s.bottom; y += 8) ctx.fillRect(lx - 1, y, railGap + 2, 2);
    }
  }

  // 전단지 내용(알아볼 수 없는 추상 포스터): 색면 + 읽을 수 없는 글줄. di(0~9)로 변주.
  const ART_ACCENTS = ["#c0532a", "#9a3aa8", "#2a6a9a", "#2a8a4a", "#c0392b", "#caa33a", "#3a6a8a", "#a85a2a", "#5a6a8a", "#8a3a6a"];
  function drawFlyerArt(fx, fy, di) {
    const ox = fx + 1, W = 10;
    const ac = ART_ACCENTS[di % ART_ACCENTS.length];
    let ty = fy + 5;
    if (di % 3 !== 0) {                                  // 흐릿한 이미지 색면(무엇인지 알 수 없음)
      ctx.globalAlpha = 0.42; ctx.fillStyle = ac; ctx.fillRect(ox, ty, W, 4); ctx.globalAlpha = 1; ty += 6;
    } else {                                             // 작은 색 강조줄(제목 느낌만)
      ctx.globalAlpha = 0.5; ctx.fillStyle = ac; ctx.fillRect(ox, ty, 4 + di % 5, 2); ctx.globalAlpha = 1; ty += 4;
    }
    ctx.fillStyle = "rgba(0,0,0,0.22)";                  // 읽을 수 없는 본문 줄들
    for (let i = 0; ty < fy + 17; i++, ty += 2) {
      const ww = 3 + ((di * 5 + i * 4 + 7) % (W - 2));
      ctx.fillRect(ox, ty, ww, 1);
    }
  }

  // 전단지 슬롯(가로 12 × 세로 18). taped=벽 테이프, paw=강아지 발자국, torn=고양이가 찢음.
  function drawSlot(fx, fy, filled, taped, paw, torn) {
    if (filled && torn) {                                                                 // 찢긴 전단지(점수 무효)
      ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(fx + 1, fy + 1, 12, 18);
      ctx.fillStyle = "#c8c4ba"; ctx.fillRect(fx, fy, 5, 18); ctx.fillRect(fx + 8, fy, 4, 18);  // 두 조각만 남음
      ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(fx, fy, 5, 2); ctx.fillRect(fx + 8, fy, 4, 2);
      ctx.fillStyle = "rgba(0,0,0,0.18)";                                                 // 찢긴 가장자리(지그재그)
      for (let i = 0; i < 18; i += 3) { ctx.fillRect(fx + 5, fy + i, 1, 1); ctx.fillRect(fx + 7, fy + i + 1, 1, 1); }
      return;
    }
    if (filled) {
      ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(fx + 1, fy + 1, 12, 18);          // 종이 그림자
      ctx.fillStyle = FLYER.color; ctx.fillRect(fx, fy, 12, 18);                          // 전단지 종이
      if (paw) {                                                                          // 강아지 발자국 — 1/2 크기, 중앙 정렬(발가락 4 + 발바닥 패드)
        ctx.fillStyle = "rgba(26,18,18,0.9)";
        ctx.fillRect(fx + 3, fy + 7, 1, 2); ctx.fillRect(fx + 5, fy + 6, 1, 2);            // 발가락(좌2)
        ctx.fillRect(fx + 7, fy + 6, 1, 2); ctx.fillRect(fx + 9, fy + 7, 1, 2);            // 발가락(우2)
        ctx.fillRect(fx + 5, fy + 10, 3, 2); ctx.fillRect(fx + 6, fy + 9, 1, 1);           // 발바닥 패드
      } else {
        ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(fx, fy, 12, 3);                   // 제목줄
        const _h = ((Math.floor(fx) * 73856093) ^ (Math.floor(fy) * 19349663)) >>> 0;     // 슬롯별 해시(이웃 중복 무관)
        drawFlyerArt(fx, fy, _h % 10);                                                     // 10종 중 랜덤(위치 고정) 그림
      }
      if (taped) { ctx.fillStyle = "rgba(225,228,236,0.55)"; ctx.fillRect(fx - 1, fy - 1, 2, 2); ctx.fillRect(fx + 11, fy - 1, 2, 2); } // 모서리 테이프
      else { ctx.fillStyle = "#fff"; ctx.fillRect(fx + 5, fy - 1, 2, 1); }                 // 압정
    } else if (taped) {
      ctx.fillStyle = "rgba(0,0,0,0.16)"; ctx.fillRect(fx, fy, 12, 18);                    // 떼어낸 풀 자국
      ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.fillRect(fx, fy, 12, 2);
    } else {
      ctx.fillStyle = "rgba(0,0,0,0.26)"; ctx.fillRect(fx, fy, 12, 18);                    // 빈 칸
      ctx.fillStyle = "rgba(255,255,255,0.14)"; ctx.fillRect(fx + 5, fy - 1, 2, 1);        // 빈 압정 자국
    }
  }

  // 게시판(5×2, 10칸) — 전단지 가로 2배·세로 2배에 맞춰 확대. top y 반환.
  function drawSpotBoard(s, hot) {
    const bw = 78, bh = 48, bx = s.x - bw / 2, by = s.y - 52;
    ctx.fillStyle = "#3a342c"; ctx.fillRect(bx + 6, by + bh - 1, 3, 10); ctx.fillRect(bx + bw - 9, by + bh - 1, 3, 10); // 기둥
    ctx.fillStyle = hot ? "#5a4226" : "#33333f"; ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);          // 프레임
    ctx.fillStyle = hot ? "#caa36a" : "#5a5a70"; ctx.fillRect(bx, by, bw, bh);                           // 코르크판
    ctx.fillStyle = "rgba(0,0,0,0.10)"; for (let d = 3; d < bw; d += 4) ctx.fillRect(bx + d, by, 1, bh); // 결
    ctx.fillStyle = hot ? "#7a6233" : "#4a4a5e"; ctx.fillRect(bx - 2, by - 2, bw + 4, 4);                // 헤더
    for (let i = 0; i < s.slots; i++) drawSlot(bx + 4 + (i % 5) * 14, by + 6 + ((i / 5) | 0) * 20, i < s.filled, false, s.dogSet.has(i), s.tornSet.has(i));
    return by;
  }

  // 건물 외벽에 몰래 붙이는 스팟 — 별개 구조물이 아니라 벽면 일부. 낙서·떨어진 전단지 흔적 포함.
  function drawSpotWall(s, hot) {
    const P = STAGES[stageIdx].pal;
    const n = s.slots, sw = 14, margin = 9;
    const rowW = (n - 1) * sw + 12;           // 전단지 줄 폭(슬롯 가로 12)
    const pw = rowW + margin * 2;             // 부착 영역 폭
    const bx = s.x - pw / 2;
    const rr = (k) => { const v = Math.sin(s.x * 12.9898 + k * 78.233) * 43758.5453; return v - Math.floor(v); };
    // 1) 벽면을 천장(2층 발 높이)까지 길게 → 건물 벽의 일부처럼 보이게(별개 패널 느낌 제거)
    const wallTop = UPPER_Y + 4, wallX = bx - 6, wallW = pw + 12;
    ctx.fillStyle = P.wall; ctx.fillRect(wallX, wallTop, wallW, s.y - wallTop);
    ctx.fillStyle = "rgba(0,0,0,0.10)";                              // 벽돌 줄눈(가로)
    for (let yy = wallTop + 10; yy < s.y; yy += 14) ctx.fillRect(wallX, yy, wallW, 1);
    ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.fillRect(wallX, wallTop, 1, s.y - wallTop); // 미세 음영
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(wallX, s.y - 2, wallW, 2);          // 밑단 그림자
    // 2) 같은 건물에 이미 붙어있는 다른(낡은) 전단지들 — 랜덤하게 흩어져 부착
    const oldCols = ["rgba(214,210,196,0.72)", "rgba(198,194,178,0.66)", "rgba(224,214,200,0.7)", "rgba(190,200,212,0.62)", "rgba(212,200,196,0.66)"];
    const yLo = wallTop + 6, yHi = s.y - 42;
    for (let k = 0; k < 6; k++) {
      const ox = Math.round(wallX + 4 + rr(k * 3 + 1) * (wallW - 14));
      const oy = Math.round(yLo + rr(k * 3 + 2) * (yHi - yLo));
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(ox + 1, oy + 1, 7, 14);           // 그림자
      ctx.fillStyle = oldCols[(rr(k * 3 + 3) * oldCols.length) | 0];                      // 낡은 전단지
      ctx.fillRect(ox, oy, 7, 14);
      ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(ox, oy, 7, 2);                       // 제목줄
      ctx.fillStyle = "rgba(0,0,0,0.12)"; ctx.fillRect(ox + 1, oy + 5, 5, 1); ctx.fillRect(ox + 1, oy + 9, 4, 1); // 본문줄
    }
    // 3) 떨어진/뜯긴 전단지 흔적: 벽에 남은 풀 자국 + 바닥에 구겨진 종이
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(bx + 2, s.y - 30, 5, 7); ctx.fillRect(bx + pw - 9, s.y - 27, 5, 6);     // 뜯긴 자국(벽)
    ctx.fillStyle = "rgba(225,222,212,0.55)";                                            // 바닥 구겨진 전단지
    ctx.fillRect(bx - 9, s.y - 3, 5, 3); ctx.fillRect(bx + pw + 3, s.y - 2, 4, 2);
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(bx - 9, s.y - 3, 5, 1);
    if (hot) { ctx.fillStyle = "rgba(255,210,90,0.10)"; ctx.fillRect(bx - 2, s.y - 26, pw + 4, 26); } // 핫스팟 은은한 강조
    // 4) 전단지를 벽에 직접(테이프) — 눈높이 한 줄(세로 2배)
    const fy = s.y - 26;
    for (let i = 0; i < n; i++) drawSlot(bx + margin + i * sw, fy, i < s.filled, true, s.dogSet.has(i), s.tornSet.has(i));
    return fy - 2;   // 핀/카운트 기준
  }

  // 주차 차량 본체(트럭/버스) — 지오메트리 반환. tint로 색 다양.
  function drawVehicleBody(cx, kind, tint, dim) {
    const F = (c) => dim ? DK(c) : c;   // 장식(props)으로 그릴 땐 어둡게, 스팟으로 그릴 땐 그대로
    const truck = kind === "truck";
    const w = truck ? 92 : 100, h = truck ? 26 : 28;
    const bx = cx - w / 2, by = GROUND_Y - h - 4;
    ctx.fillStyle = F("rgba(0,0,0,0.28)"); ctx.fillRect(bx - 2, GROUND_Y - 2, w + 4, 3);                 // 그림자
    ctx.fillStyle = F("#15151a"); ctx.fillRect(bx + 7, GROUND_Y - 5, 8, 5); ctx.fillRect(bx + w - 15, GROUND_Y - 5, 8, 5); // 바퀴
    if (truck) {
      const body = ["#cdd0d6", "#c9a24a", "#9aa0aa"][((tint || 0) * 3) | 0];
      ctx.fillStyle = F("#5a8ac0"); ctx.fillRect(bx, by + 6, 15, h - 6);                                 // 캐빈
      ctx.fillStyle = F("rgba(190,220,245,0.6)"); ctx.fillRect(bx + 2, by + 8, 10, 7);                   // 캐빈 창
      ctx.fillStyle = F(body); ctx.fillRect(bx + 15, by, w - 15, h);                                     // 화물칸
      ctx.fillStyle = F("rgba(255,255,255,0.12)"); ctx.fillRect(bx + 15, by, w - 15, 2);
      ctx.fillStyle = F("rgba(0,0,0,0.18)"); ctx.fillRect(bx + 15, by, 1, h);
    } else {
      const body = ["#e0a83a", "#d2683a", "#3a8ac0"][((tint || 0) * 3) | 0];
      ctx.fillStyle = F(body); ctx.fillRect(bx, by, w, h);                                                // 버스 본체
      ctx.fillStyle = F("rgba(255,255,255,0.12)"); ctx.fillRect(bx, by, w, 2);
      ctx.fillStyle = F("rgba(190,220,245,0.6)"); for (let wx = bx + 6; wx < bx + w - 8; wx += 12) ctx.fillRect(wx, by + 4, 9, 7); // 창
      ctx.fillStyle = F("rgba(0,0,0,0.2)"); ctx.fillRect(bx, by + h - 6, w, 1);
    }
    return { bx, by, w, h, truck };
  }

  // 주차 차량 스팟(측면에 전단지) — top y 반환
  function drawSpotVehicle(s) {
    const G = drawVehicleBody(s.x, s.kind, s.tintv);
    const n = s.slots, sw = 14;
    const areaX = G.truck ? G.bx + 17 : G.bx + 10, ay = G.by + 4;   // 전단지 가로 1.5배 → 차체 안에 맞춤
    for (let i = 0; i < n; i++) drawSlot(areaX + i * sw, ay, i < s.filled, true, s.dogSet.has(i), s.tornSet.has(i));
    return G.by;
  }

  // 전봇대(세로 적층, 3칸) — 전단지 세로 2배 적층에 맞춰 기둥 연장. top y 반환.
  function drawSpotPole(s) {
    const px = s.x, baseY = s.y, poleH = 70, poleTop = baseY - poleH;
    ctx.fillStyle = "#6a5f50"; ctx.fillRect(px - 6, poleTop, 13, poleH);                                 // 기둥(전단지 폭 감쌈)
    ctx.fillStyle = "#564d40"; ctx.fillRect(px - 6, poleTop, 1, poleH);                                  // 음영
    ctx.fillStyle = "#4a4238"; ctx.fillRect(px - 11, poleTop + 4, 22, 2);                                // 상단 가로대
    ctx.fillRect(px - 11, poleTop + 9, 22, 1);
    for (let i = 0; i < s.slots; i++) drawSlot(px - 6, poleTop + 10 + i * 20, i < s.filled, false, s.dogSet.has(i), s.tornSet.has(i)); // 세로 적층
    return poleTop + 2;
  }

  function drawSpotOne(s) {
    const hot = s.base >= 18;
    const full = s.filled >= s.slots;
    const topY = s.kind === "wall" ? drawSpotWall(s, hot)
               : s.kind === "pole" ? drawSpotPole(s)
               : (s.kind === "truck" || s.kind === "bus") ? drawSpotVehicle(s)
               : drawSpotBoard(s, hot);
    s._topY = topY;   // 핀은 별도 패스(drawSpotPins)에서 최상단 뎁스로 그림
    // 현재 슬롯 부착 진행 게이지 (스팟 상단 기준)
    if (s._busy && s.p > 0) {
      const gw = s.kind === "wall" ? 110 : s.kind === "pole" ? 20 : s.kind === "truck" ? 70 : s.kind === "bus" ? 84 : 70;
      ctx.fillStyle = "#222"; ctx.fillRect(s.x - gw / 2, topY - 5, gw, 3);
      ctx.fillStyle = "#5cff9e"; ctx.fillRect(s.x - gw / 2, topY - 5, gw * s.p, 3);
    }
    // 카운트(채움/전체) — 볼드 + 픽셀 드롭섀도우
    const cntTxt = (hot ? "★" : "") + s.filled + "/" + s.slots;
    ctx.font = "bold 7px Galmuri11, monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "#000"; ctx.fillText(cntTxt, s.x + 1, topY - 6);          // 1px 하드 그림자
    ctx.fillStyle = full ? "#5cff9e" : hot ? "#ffd24d" : "#9aa";
    ctx.fillText(cntTxt, s.x, topY - 7);
  }

  function drawSpots() { for (const s of spots) if (vis(s.x, 92)) drawSpotOne(s); }   // 화면 밖 스팟 건너뜀

  // 둥둥 떠다니는 장소 핀 — 최상단 뎁스(플레이어·단속반보다 앞)에서 그림
  function drawSpotPins() {
    for (const s of spots) {
      if (!vis(s.x, 92)) continue;
      const hot = s.base >= 18, full = s.filled >= s.slots;
      const pinC = full ? "#5cff9e" : hot ? "#ffd24d" : "#ff5b6e";
      const py = (s._topY || s.y - 36) - 32 + Math.sin(performance.now() / 320 + s.x) * 3;
      const pin = (ox, oy, col) => {                              // 핀 실루엣
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(s.x + ox, py + oy, 5, 0, 7); ctx.fill();                          // 머리
        ctx.beginPath(); ctx.moveTo(s.x - 4 + ox, py + 3 + oy); ctx.lineTo(s.x + 4 + ox, py + 3 + oy); ctx.lineTo(s.x + ox, py + 11 + oy); ctx.closePath(); ctx.fill(); // 뾰족
      };
      pin(1, 1, "rgba(0,0,0,0.45)");                              // 픽셀 드롭섀도우
      pin(0, 0, pinC);                                            // 핀
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(s.x, py, 2, 0, 7); ctx.fill();              // 중앙 점
      // 모바일: 스팟엔 초록 원을 띄우지 않고, 상호작용 범위일 때 핀 아이콘 위에 [붙이기]만 표시
      if (mobile() && state === STATE.PLAYING && player && s.filled < s.slots && near(player, s)) {
        ctx.font = "bold 8px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        const ly = py - 9;
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText("[붙이기]", s.x + 0.5, ly + 0.5);
        ctx.fillStyle = "#fff"; ctx.fillText("[붙이기]", s.x, ly);
      }
    }
  }

  function drawBooth() {
    const x = BOOTH.x, y = BOOTH.y, w = 26, h = 48;
    // 본체
    ctx.fillStyle = "#c23b3b"; ctx.fillRect(x - w / 2, y - h, w, h);
    ctx.fillStyle = "#8f2a2a"; ctx.fillRect(x - w / 2, y - h, w, 4);
    ctx.fillRect(x - w / 2 - 2, y - 4, w + 4, 4);                 // 바닥
    // 지붕 간판 + 전화기 아이콘
    ctx.fillStyle = "#eee"; ctx.fillRect(x - w / 2 - 1, y - h - 11, w + 2, 11);
    const sy = y - h - 5;
    ctx.fillStyle = "#1a3a8a";                          // 수화기(핸드셋)
    ctx.fillRect(x - 6, sy - 2, 4, 4);                  // 왼 수화부
    ctx.fillRect(x + 2, sy - 2, 4, 4);                  // 오른 수화부
    ctx.fillRect(x - 4, sy + 1, 8, 2);                  // 손잡이
