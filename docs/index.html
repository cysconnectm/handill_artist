    ctx.fillStyle = "#1a3a8a";                          // 음파 표시
    ctx.fillRect(x + 7, sy - 5, 1, 2); ctx.fillRect(x + 9, sy - 6, 1, 4);
    // 유리창
    ctx.fillStyle = "rgba(150,200,220,0.35)"; ctx.fillRect(x - w / 2 + 3, y - h + 8, w - 6, h - 18);
    ctx.strokeStyle = "#7a2222"; ctx.lineWidth = 1;
    ctx.strokeRect(x - w / 2 + 3 + 0.5, y - h + 8 + 0.5, w - 6, h - 18);
    // 전화기 + 수화기
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(x + 2, y - h + 18, 7, 11);
    ctx.fillStyle = "#444"; ctx.fillRect(x + 3, y - h + 14, 5, 3);
    // 통화 말풍선 — 전화부스 위에 표시
    if (calling > 0) { drawSpeech(x, y - h - 14, "전데여. 다 붙였어용"); return; }
    // 상호작용 안내
    const p = player;
    if (state === STATE.PLAYING) {
      const inR = Math.abs((p.x + p.w / 2) - x) < BOOTH_R && Math.abs(p.y - y) < 18;
      if (mobile()) mobilePrompt(x, y - h - 16, "보고하기", inR);
      else if (inR) { const allDone = spots.every(s => s.filled >= s.slots); outlineText(allDone ? "[J] 통화 · 완료!" : "[J] 통화 · 정산", x, y - h - 16, allDone ? "#5cff9e" : "#7fffd4", 8); }
    }
  }

  // 말풍선 (월드 좌표). scale 로 크기 조절(민원인은 2배).
  function drawSpeech(cx, topY, text, scale = 1, fg = "#1a1a1a") {
    const fs = Math.round(9 * scale);
    ctx.font = fs + "px Galmuri11, monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const padX = 8 * scale, padY = 6 * scale;            // 좌우·상하 충분한 여백
    const w = Math.ceil(ctx.measureText(text).width) + padX * 2;
    const h = fs + padY * 2;
    const bx = cx - w / 2, by = topY - h, tail = 5 * scale;
    ctx.fillStyle = "#fff"; ctx.fillRect(bx, by, w, h);
    ctx.beginPath(); ctx.moveTo(cx - 4 * scale, by + h); ctx.lineTo(cx + 4 * scale, by + h); ctx.lineTo(cx, by + h + tail); ctx.closePath(); ctx.fill();
    ctx.fillStyle = fg; ctx.fillText(text, cx, by + h / 2 + 1);
    ctx.textBaseline = "alphabetic";                     // 기본값 복원(다른 텍스트 영향 방지)
  }

  // 상호작용 표기용 — 볼드(테두리 없음)
  function outlineText(text, x, y, fill, px) {
    ctx.font = "bold " + px + "px Galmuri11, monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = fill; ctx.fillText(text, x, y);
  }

  function drawNinjas() {
    const pcx = player.x + player.w / 2;
    const KIND = {
      cloak: { glow: "127,255,212", col: "#7fffd4", label: "닌자화" },
      time:  { glow: "120,200,255", col: "#8ec8ff", label: "시간+10" },
      smoke: { glow: "150,225,255", col: "#aee6ff", label: "세상정지" },
    };
    for (const n of ninjas) {
      if (n.taken || !vis(n.x, 24)) continue;
      const K = KIND[n.kind] || KIND.cloak;
      const cy = n.y - 20 + Math.sin(performance.now() / 200 + n.x) * 2;
      // 글로우
      const g = ctx.createRadialGradient(n.x, cy, 2, n.x, cy, 18);
      g.addColorStop(0, `rgba(${K.glow},0.4)`); g.addColorStop(1, `rgba(${K.glow},0)`);
      ctx.fillStyle = g; ctx.fillRect(n.x - 18, cy - 18, 36, 36);
      // 아이콘
      ctx.fillStyle = K.col; ctx.fillRect(n.x - 6, cy - 6, 12, 12);
      if (n.kind === "time") {                              // 시계: 흰 테 + 바늘
        ctx.strokeStyle = "#16324f"; ctx.lineWidth = 1; ctx.strokeRect(n.x - 4, cy - 4, 8, 8);
        ctx.fillStyle = "#16324f"; ctx.fillRect(n.x, cy - 3, 1, 4); ctx.fillRect(n.x, cy, 3, 1);
      } else if (n.kind === "smoke") {                      // 세상정지: 얼음 결정(눈꽃)
        ctx.fillStyle = "#2a6a9a";
        ctx.fillRect(n.x - 1, cy - 5, 2, 10); ctx.fillRect(n.x - 5, cy - 1, 10, 2);     // 십자
        ctx.fillRect(n.x - 4, cy - 4, 2, 2); ctx.fillRect(n.x + 2, cy + 2, 2, 2);       // 대각
        ctx.fillRect(n.x + 2, cy - 4, 2, 2); ctx.fillRect(n.x - 4, cy + 2, 2, 2);
      } else {                                              // 투명화: 닌자 눈띠
        ctx.fillStyle = "#0a0a12"; ctx.fillRect(n.x - 4, cy - 2, 8, 2);
      }
      // 상호작용 표기 (볼드)
      const near = Math.abs(pcx - n.x) < 16 && Math.abs(player.y - n.y) < 20;
      if (mobile()) mobilePrompt(n.x, cy - 14, K.label, near && state === STATE.PLAYING);
      else if (near && state === STATE.PLAYING) outlineText("[J] " + K.label, n.x, cy - 14, K.col, 8);
      else outlineText("[J]", n.x, cy - 12, K.col, 7);
    }
  }

  // 자전거 (탑승자 별도) — 보행자 발 높이 y 기준
  function drawBike(x, y, dir) {
    ctx.strokeStyle = "#d8dde4"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(x - 6, y - 3, 3, 0, 7); ctx.stroke();   // 뒷바퀴
    ctx.beginPath(); ctx.arc(x + 6, y - 3, 3, 0, 7); ctx.stroke();   // 앞바퀴
    ctx.strokeStyle = "#9aa4b0";
    ctx.beginPath(); ctx.moveTo(x - 6, y - 3); ctx.lineTo(x, y - 8); ctx.lineTo(x + 6, y - 3);  // 프레임
    ctx.moveTo(x, y - 8); ctx.lineTo(x - 1, y - 4); ctx.stroke();
    ctx.fillStyle = "#3a3f48"; ctx.fillRect(x - 2, y - 10, 4, 2);    // 안장
    ctx.fillRect(x + 5 + dir, y - 11, 3, 2);                          // 핸들
  }

  // 길거리 장식 오브젝트 렌더 (비상호작용). 강아지는 스팟보다 앞 뎁스라 drawStreetDogs로 분리.
  function drawProps() {
    const now = performance.now();
    for (const q of props) {
      if (q.kind === "dog" || !vis(q.x, 70)) continue;   // 강아지는 별도 패스 / 화면 밖 건너뜀
      const x = q.x, y = q.y;
      if (FILTER_OK) ctx.filter = "brightness(0.6)";   // 지원 시 필터, 미지원 시 색을 DK로 어둡게
      if (q.kind === "car") {
        const cols = ["#b5494a", "#3a6ea5", "#caa94a", "#3f8a5a", "#6a6f7a", "#9a9aa6"];
        const col = cols[Math.floor(q.tint * cols.length) % cols.length];
        ctx.fillStyle = DK("rgba(0,0,0,0.28)"); ctx.fillRect(x - 19, y - 2, 38, 3);     // 그림자
        ctx.fillStyle = DK(col); ctx.fillRect(x - 18, y - 12, 36, 10);                   // 차체
        ctx.fillStyle = DK("rgba(0,0,0,0.18)"); ctx.fillRect(x - 18, y - 4, 36, 2);
        ctx.fillStyle = DK(col); ctx.fillRect(x - 12, y - 17, 24, 6);                     // 지붕
        ctx.fillStyle = DK("rgba(255,255,255,0.18)"); ctx.fillRect(x - 12, y - 17, 24, 1);
        ctx.fillStyle = DK("rgba(185,215,240,0.55)"); ctx.fillRect(x - 10, y - 16, 9, 5); ctx.fillRect(x + 1, y - 16, 9, 5); // 창
        ctx.fillStyle = DK("#15151a"); ctx.fillRect(x - 13, y - 3, 7, 4); ctx.fillRect(x + 6, y - 3, 7, 4); // 바퀴
        ctx.fillStyle = DK("#ffe6a0"); ctx.fillRect(x + 16, y - 10, 2, 2);                // 헤드라이트
        ctx.fillStyle = DK("#d24a4a"); ctx.fillRect(x - 18, y - 10, 2, 2);                // 후미등
      } else if (q.kind === "truck" || q.kind === "bus") {
        drawVehicleBody(x, q.kind, q.tint, true);                                         // 주차 트럭/버스(장식, 어둡게)
      } else if (q.kind === "sign") {
        ctx.fillStyle = DK("rgba(0,0,0,0.25)"); ctx.fillRect(x - 8, y - 2, 16, 2);        // 그림자
        ctx.fillStyle = DK("#3a2f24"); ctx.fillRect(x - 7, y - 4, 2, 4); ctx.fillRect(x + 5, y - 4, 2, 4); // 다리
        ctx.fillStyle = DK("#6a533a"); ctx.fillRect(x - 9, y - 24, 18, 21);               // 프레임
        ctx.fillStyle = DK("#efe7d2"); ctx.fillRect(x - 7, y - 22, 14, 17);               // 보드 면
        ctx.fillStyle = DK(q.tint < 0.5 ? "#c83a3a" : "#2a5fb0"); ctx.fillRect(x - 5, y - 20, 10, 3); // 헤드라인
        ctx.fillStyle = DK("rgba(40,40,40,0.5)");                                          // 글자 줄
        for (let i = 0; i < 3; i++) ctx.fillRect(x - 5, y - 15 + i * 4, 9, 1);
      }
      if (FILTER_OK) ctx.filter = "none";
    }
  }

  // 길거리 강아지 — 스팟보다 앞 뎁스로 별도 렌더
  function drawStreetDogs() {
    for (const q of props) {
      if (q.kind !== "dog" || !vis(q.x, 24)) continue;
      const col = q.tint < 0.5 ? "#a9763f" : q.tint < 0.8 ? "#5a4a3a" : "#d8d2c4";
      drawDogSprite(q.x, q.y, col, q.dir, q.anim, q.moving);
      if (q.pettable && state === STATE.PLAYING) {
        const npet = Math.abs((player.x + player.w / 2) - q.x) < 20 && Math.abs(player.y - q.y) < 18;
        if (mobile()) mobilePrompt(q.x, q.y - 22, "쓰다듬기", npet);
        else outlineText(npet ? "[J] 쓰다듬기" : "[J]", q.x, q.y - 22, "#ffd24d", npet ? 8 : 7);
      }
    }
  }

  // 코인 (둥둥 떠다니는 동전)
  function drawCoins() {
    if (!coins) return;
    const now = performance.now();
    for (const c of coins) {
      if (c.taken || !vis(c.x, 16)) continue;
      const yy = c.y - 22 + Math.sin(now / 260 + c.phase) * 2;
      ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.arc(c.x, c.y - 2, 4, 0, 7); ctx.fill();   // 그림자
      ctx.fillStyle = "#e0a82a"; ctx.beginPath(); ctx.arc(c.x, yy, 5, 0, 7); ctx.fill();                 // 동전
      ctx.fillStyle = "#ffe680"; ctx.beginPath(); ctx.arc(c.x - 1, yy - 1, 2, 0, 7); ctx.fill();         // 광택
      ctx.fillStyle = "#9a6a10"; ctx.font = "bold 6px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", c.x, yy + 1); ctx.textBaseline = "alphabetic";
    }
  }

  const CAT_WHITE = "#f4f2ec", CAT_EDGE = "#c4c0b6";   // 흰색 고양이(외곽 음영으로 가독성)

  // 고양이(흰색) — 전단지를 찢는 방해꾼. 머리 위 [J] 항상 표시.
  function drawCats() {
    if (!cats) return;
    for (const c of cats) {
      const x = c.x, y = c.lane, d = c.dir, t = c.anim;
      if (tearEvent && tearEvent.cat === c) { drawCatBack(c); }   // 찢는 중엔 뒷모습
      else {
        const step = c.moving ? (Math.sin(t * 14) > 0 ? 1 : -1) : 0;
        ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(x - 5, y - 1, 11, 2);
        ctx.fillStyle = CAT_EDGE;                                 // 외곽(살짝 어둡게)
        ctx.fillRect(x - d * 5, y - 18, 2, 13);                   // 가늘고 긴 꼿꼿한 꼬리
        ctx.fillStyle = CAT_WHITE;
        ctx.fillRect(x - 5, y - 6, 9, 5);                         // 몸통
        ctx.fillRect(x + d * 3, y - 9, 5, 5);                     // 머리
        ctx.fillRect(x + d * 3, y - 11, 2, 2); ctx.fillRect(x + d * 5, y - 11, 2, 2); // 귀
        ctx.fillStyle = "rgba(0,0,0,0.12)"; ctx.fillRect(x - 5, y - 2, 9, 1);          // 배 음영
        if (c.moving) { ctx.fillStyle = CAT_WHITE; ctx.fillRect(x - 3 + step, y - 1, 2, 1); ctx.fillRect(x + 2 - step, y - 1, 2, 1); }
        if (c.asleep) { ctx.fillStyle = "#666"; ctx.fillRect(x + d * 3, y - 8, 3, 1); }   // 감은 눈(자는 중)
        else { ctx.fillStyle = "#3aa"; ctx.fillRect(x + d * 4, y - 8, 1, 1); }            // 눈
        ctx.fillStyle = "#d2829a"; ctx.fillRect(x + d * 6, y - 7, 1, 1); // 코
      }
      // 자는 고양이: 머리 위 zzz (작은→큰, 둥실)
      if (c.asleep) {
        const b = Math.sin(t * 2.5) * 1.5; ctx.fillStyle = "#bcdfff"; ctx.textAlign = "left";
        ctx.font = "6px Galmuri11, monospace"; ctx.fillText("z", x + 3, y - 13 + b);
        ctx.font = "8px Galmuri11, monospace"; ctx.fillText("z", x + 7, y - 17 + b);
        ctx.font = "10px Galmuri11, monospace"; ctx.fillText("z", x + 11, y - 22 + b);
      }
      // 머리 위 [J] 항상 표시(가까이선 '[J] 츄르')
      else if (!c.done && state === STATE.PLAYING) {
        const np = Math.abs((player.x + player.w / 2) - x) < 22 && Math.abs(player.y - c.lane) < 18;
        if (mobile()) mobilePrompt(x, y - 20, "츄르주기", np);
        else outlineText(np ? "고양이 [J] 츄르" : "고양이 [J]", x, y - 20, "#9fe0ff", np ? 8 : 7);
      }
    }
  }

  // 고양이 찢는 뒷모습 (가늘고 긴 꼿꼿한 꼬리 + 찢는 손동작 + 종이 흩날림)
  function drawCatBack(c) {
    const x = c.x, y = c.lane, t = c.anim;
    const shred = Math.sin(t * 22) * 2;
    ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(x - 6, y - 1, 13, 2);
    ctx.fillStyle = CAT_EDGE; ctx.fillRect(x - 1, y - 22, 2, 17);    // 꼿꼿한 꼬리
    ctx.fillStyle = CAT_WHITE;
    ctx.fillRect(x - 6, y - 11, 12, 10);                         // 몸통(등)
    ctx.fillRect(x - 4, y - 16, 8, 6);                           // 머리(뒤통수)
    ctx.fillRect(x - 4, y - 19, 3, 3); ctx.fillRect(x + 1, y - 19, 3, 3);  // 귀
    ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(x - 1, y - 11, 1, 10); // 등선
    // 앞발 찢는 동작 + 종이 흩날림
    ctx.fillStyle = CAT_WHITE; ctx.fillRect(x - 7, y - 4 + shred, 2, 4); ctx.fillRect(x + 5, y - 4 - shred, 2, 4);
    ctx.fillStyle = "#fff"; ctx.fillRect(x - 9, y - 8 - shred, 2, 2); ctx.fillRect(x + 8, y - 6 + shred, 2, 2);
  }

  // 강아지 스프라이트 (고양이의 1.5배 크기 — 발 위치 기준 확대)
  function drawDogSprite(x, y, col, d, t, walking, outline) {
    const step = walking ? (Math.sin(t * 13) > 0 ? 1.5 : -1.5) : 0;
    const wag = Math.sin(t * (walking ? 18 : 9)) * 3;
    ctx.save(); ctx.translate(x, y); ctx.scale(1.5, 1.5); ctx.translate(-x, -y);  // 1.5배
    if (!outline) { ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(x - 7, y - 1, 16, 2); }
    ctx.fillStyle = outline || col;
    ctx.fillRect(x - 6, y - 8, 12, 6);                        // 몸통
    ctx.fillRect(x + d * 5, y - 12, 5, 7);                    // 목/머리
    ctx.fillRect(x + d * 9, y - 9, 3, 2);                     // 주둥이
    ctx.fillRect(x + d * 5, y - 13, 2, 3);                    // 귀
    ctx.fillRect(x - d * 7, y - 9 - wag, 4, 2);               // 꼬리(흔듦)
    ctx.fillStyle = outline || "#2b2b2b";
    ctx.fillRect(x - 4 + step, y - 3, 2, 3); ctx.fillRect(x + 2 - step, y - 3, 2, 3); // 다리
    if (!outline) { ctx.fillStyle = "#000"; ctx.fillRect(x + d * 8, y - 11, 1, 1); } // 눈
    ctx.restore();
  }

  // 강아지 동료 — 부착 중엔 두 발로 일어서서 꼬리 흔드는 뒷모습
  function drawDogStandBack(x, y, col, t, outline) {
    const wag = Math.sin(t * 16) * 2.5;                      // 꼬리 흔들
    if (!outline) { ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(x - 4, y - 1, 9, 2); }  // 그림자
    ctx.fillStyle = outline || col;
    ctx.fillRect(x - 1 + wag * 0.6, y - 14, 2, 3); ctx.fillRect(x - 1 + wag, y - 17, 2, 3); // 꼬리(위로·흔들)
    ctx.fillRect(x - 4, y - 3, 3, 3); ctx.fillRect(x + 2, y - 3, 3, 3);        // 두 뒷다리(서 있음)
    ctx.fillRect(x - 4, y - 12, 8, 9);                                         // 몸통(세로·등)
    if (!outline) { ctx.fillStyle = "rgba(0,0,0,0.12)"; ctx.fillRect(x - 1, y - 11, 1, 8); }  // 등 중앙 음영
    ctx.fillStyle = outline || col;
    ctx.fillRect(x - 5, y - 11, 2, 5); ctx.fillRect(x + 3, y - 11, 2, 5);      // 앞발(벽 향해 듦)
    ctx.fillRect(x - 3, y - 16, 6, 6);                                         // 머리(뒤통수)
    ctx.fillRect(x - 4, y - 18, 2, 3); ctx.fillRect(x + 2, y - 18, 2, 3);      // 귀
    if (!outline) {
      ctx.fillStyle = "#d23a3a"; ctx.fillRect(x - 3, y - 12, 6, 2);            // 빨간 목걸이
      ctx.fillStyle = "#ffd24d"; ctx.fillRect(x, y - 11, 1, 1);               // 인식표
    }
  }

  const OUTLINE_OFF = [[-1, 0], [1, 0], [0, -1], [0, 1]];     // 화이트 가장자리 스탬프 오프셋
  function drawCompanion() {
    const d = companion; if (!d) return;
    if (d.attachSpot) {                                       // 부착 중: 일어서서 꼬리 흔드는 뒷모습
      for (const o of OUTLINE_OFF) { ctx.save(); ctx.translate(o[0], o[1]); drawDogStandBack(d.x, d.y, "#caa06a", d.anim, "#fff"); ctx.restore(); }
      drawDogStandBack(d.x, d.y, "#caa06a", d.anim);
      ctx.fillStyle = "#9fe0ff"; ctx.fillRect(d.x - 5, d.y - 22, 10 * Math.min(1, d.attachP), 2); // 진행 표시
      return;
    }
    for (const o of OUTLINE_OFF) { ctx.save(); ctx.translate(o[0], o[1]); drawDogSprite(d.x, d.y, "#caa06a", d.dir, d.anim, d.mstate !== "idle", "#fff"); ctx.restore(); }
    drawDogSprite(d.x, d.y, "#caa06a", d.dir, d.anim, d.mstate !== "idle");
    // 빨간 목걸이(+ 금색 인식표) — 1.5배 강아지에 맞춰 동일 스케일
    ctx.save(); ctx.translate(d.x, d.y); ctx.scale(1.5, 1.5); ctx.translate(-d.x, -d.y);
    ctx.fillStyle = "#d23a3a"; ctx.fillRect(d.x + d.dir * 5, d.y - 7, 5, 2);
    ctx.fillStyle = "#ffd24d"; ctx.fillRect(d.x + d.dir * 7, d.y - 6, 1, 2);
    ctx.restore();
  }

  function drawCitizens() {
    const now = performance.now();
    for (const c of citizens) {
      if (!vis(c.x, 24)) continue;                       // 화면 밖 행인 건너뜀
      const angry = c.speechT > 0;                      // 신고 중 = 방방 뛰며 화남
      const jump = angry ? Math.abs(Math.sin(now / 90)) * 6 : 0;
      const x = c.x, y = c.lane - jump;                 // 점프 시 발끝이 들림
      const stride = (c.moving && !angry) ? (Math.sin(now / 130 + c.phase) > 0 ? 1 : -1) : 0;
      // 민원인 감지 영역 표시(단속반의 1/3)
      if (c.isComplainer) {                                  // 감지 영역(좌우 얇은 띠)
        const r = TUNE.complainRange;
        ctx.fillStyle = angry ? "rgba(255,40,40,0.4)" : "rgba(255,60,60,0.24)";
        ctx.fillRect(c.x - r, c.lane - 16, r * 2, 10);
      }
      const dim = !c.isComplainer;                       // 민원인(상호작용) 외 행인은 어둡게
      const D = (cc) => (dim && !FILTER_OK) ? darken(cc, 0.6) : cc;   // filter 미지원 시 색으로 어둡게
      if (dim && FILTER_OK) ctx.filter = "brightness(0.6)";
      // 자전거(타는 사람)는 몸 아래에 자전거 먼저
      if (c.ctype === "cyclist") drawBike(x, c.lane, c.dir);
      const by = c.ctype === "cyclist" ? y - 7 : y;        // 자전거는 안장 위에 앉음
      const lean = c.ctype === "runner" ? c.dir * 2 : 0;   // 뛰는 사람은 앞으로 기움
      // 백팩 (등쪽)
      if (c.ctype === "backpack") { ctx.fillStyle = D(c.accent); ctx.fillRect(x + (c.dir === 1 ? -8 : 5), by - c.h + 1, 4, c.h - 6); }
      // 몸통
      ctx.fillStyle = D(c.color); ctx.fillRect(x - 5 + lean, by - c.h, 10, c.h - 5);
      // 정장 넥타이
      if (c.tie) { ctx.fillStyle = D(c.tie); ctx.fillRect(x - 1 + lean, by - c.h + 1, 2, Math.max(3, c.h - 9)); }
      // 머리 + 머리카락(타입별 색)
      ctx.fillStyle = D("#e7c39a"); ctx.fillRect(x - 3 + lean, by - c.h - 5, 6, 6);
      ctx.fillStyle = D(c.hair); ctx.fillRect(x - 3 + lean, by - c.h - 6, 6, 2);
      if (c.ctype === "punk") { ctx.fillRect(x - 1 + lean, by - c.h - 9, 2, 3); }   // 솟은 머리(모히칸)
      // 노인 지팡이
      if (c.ctype === "elder") { ctx.strokeStyle = D("#7a5a32"); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x + 6, by - c.h + 3); ctx.lineTo(x + 8, by - 1); ctx.stroke(); }
      // 다리
      if (c.ctype === "cyclist") {                          // 페달 밟는 다리
        ctx.fillStyle = D("#2b2b3a"); ctx.fillRect(x - 2, by - 4, 3, 4); ctx.fillRect(x + 1, by - 5, 3, 4);
      } else {
        const amp = c.ctype === "runner" ? 2.2 : 1;
        ctx.fillStyle = D("#2b2b3a");
        ctx.fillRect(x - 4 + stride * amp + lean, y - 5, 3, 5);
        ctx.fillRect(x + 1 - stride * amp + lean, y - 5, 3, 5);
      }
      // 민원인: 크고 잘 보이는 안경 (사이렌 대신)
      if (c.isComplainer) {
        const hy = y - c.h - 4;                          // 안경 높이(눈 위치)
        ctx.fillStyle = "#1a1a22";                       // 검은 뿔테
        ctx.fillRect(x - 5, hy - 1, 5, 5);
        ctx.fillRect(x, hy - 1, 5, 5);
        ctx.fillRect(x - 1, hy, 2, 1);                   // 브릿지
        ctx.fillStyle = "#eef4ff";                       // 흰 렌즈
        ctx.fillRect(x - 4, hy, 3, 3); ctx.fillRect(x + 1, hy, 3, 3);
        ctx.fillStyle = "#222";                          // 눈동자
        if (angry) {                                     // 화나면 눈 치켜뜸
          ctx.fillRect(x - 3, hy + 1, 2, 1); ctx.fillRect(x + 2, hy + 1, 2, 1);
        } else {
          const look = Math.round(Math.sin(now / 360 + c.phase) * 1.2);
          ctx.fillRect(clamp(x - 3 + look, x - 4, x - 2), hy + 1, 1, 1);
          ctx.fillRect(clamp(x + 2 + look, x + 1, x + 3), hy + 1, 1, 1);
        }
        // 화남 표시(핏대)
        if (angry) { ctx.fillStyle = "#ff4444"; ctx.fillRect(x + 4, y - c.h - 6, 3, 1); ctx.fillRect(x + 5, y - c.h - 8, 1, 3); }
      }
      if (dim && FILTER_OK) ctx.filter = "none";
      // 신고 말풍선 (2배 크기)
      if (angry) drawSpeech(x, y - c.h - 12, "여기 전단지 붙이지 마세요!", 2, "#c81e1e");
    }
  }

  function drawEnforcers() {
    for (const e of enforcers) {
      if (!vis(e.x, 60)) continue;                       // 화면 밖 단속반 건너뜀
      const x = e.x, y = e.lane;

      if (e.type === "car") {
        // 경찰차: 사방 360° 감지 반경(단색 블록)
        ctx.fillStyle = "rgba(255,60,60,0.22)";
        ctx.beginPath(); ctx.arc(x, y - 6, TUNE.carRange, 0, 7); ctx.fill();
        // 차체
        ctx.fillStyle = "#dfe4ee"; ctx.fillRect(x - 18, y - 14, 36, 12);   // 본체(흰)
        ctx.fillStyle = "#26407a"; ctx.fillRect(x - 18, y - 8, 36, 6);     // 하단(파랑)
        ctx.fillStyle = "#9fb8d8"; ctx.fillRect(x - 11, y - 13, 9, 6); ctx.fillRect(x + 2, y - 13, 9, 6); // 창
        ctx.fillStyle = "#222"; ctx.fillRect(x - 14, y - 2, 6, 4); ctx.fillRect(x + 8, y - 2, 6, 4);       // 바퀴
        // 경광등(깜빡)
        const on = Math.floor(performance.now() / 250) % 2;
        ctx.fillStyle = on ? "#ff3030" : "#7a1818"; ctx.fillRect(x - 6, y - 18, 5, 4);
        ctx.fillStyle = on ? "#3060ff" : "#18347a"; ctx.fillRect(x + 1, y - 18, 5, 4);
      } else if (e.type === "flash") {
        // 손전등 빔: 회전 콘(단색 블록)
        const a = e.beamAngle, hw = TUNE.flashHalf, R = TUNE.flashRange, hx = x, hy = y - 12;
        ctx.fillStyle = "rgba(255,60,60,0.3)";
        ctx.beginPath(); ctx.moveTo(hx, hy);
        ctx.arc(hx, hy, R, a - hw, a + hw); ctx.closePath(); ctx.fill();
        // 몸 (제복 + 모자) + 손전등
        ctx.fillStyle = "#2a5a4a"; ctx.fillRect(x - 6, y - 20, 12, 18);    // 초록 제복(구분)
        ctx.fillStyle = "#e7c39a"; ctx.fillRect(x - 4, y - 26, 8, 6);
        ctx.fillStyle = "#173b30"; ctx.fillRect(x - 6, y - 28, 12, 4); ctx.fillRect(x - 7, y - 25, 14, 2);
        ctx.fillStyle = "#ff7060"; ctx.fillRect(hx - 2 + Math.cos(a) * 5, hy - 2 + Math.sin(a) * 5, 4, 4); // 손전등 머리(빨강)
        const st = Math.sin(performance.now() / 120) > 0 ? 2 : -2;
        ctx.fillStyle = "#173b30"; ctx.fillRect(x - 5, y - 2, 4, 4 + st); ctx.fillRect(x + 1, y - 2, 4, 4 - st);
      } else {
        // 기본 감시반: 정면 시야 콘 (돌아보는 중엔 미표시)
        ctx.fillStyle = "rgba(255,60,60,0.20)";
        const vd = TUNE.visionDist;
        if (e.turnT <= 0) {
          if (e.dir === 1) ctx.fillRect(x, y - 18, vd, 20);
          else ctx.fillRect(x - vd, y - 18, vd, 20);
        }
        ctx.fillStyle = "#26407a"; ctx.fillRect(x - 6, y - 20, 12, 18);
        ctx.fillStyle = "#e7c39a"; ctx.fillRect(x - 4, y - 26, 8, 6);
        ctx.fillStyle = "#16284e"; ctx.fillRect(x - 6, y - 28, 12, 4);
        ctx.fillStyle = "#16284e"; ctx.fillRect(x - 7, y - 25, 14, 2);
        ctx.fillStyle = "#fff"; ctx.fillRect(x + (e.dir === 1 ? 1 : -3), y - 24, 2, 2);
        const step = Math.sin(performance.now() / 120) > 0 ? 2 : -2;
        ctx.fillStyle = "#16284e";
        ctx.fillRect(x - 5, y - 2, 4, 4 + step); ctx.fillRect(x + 1, y - 2, 4, 4 - step);
      }
      // 단속반 머리 위 말풍선: 난감 > 경고 > 쎄한느낌 > 돌아봄(?)
      if (e.embT > 0) drawSpeech(x, y - 30, "난감하네요.", 1, "#c81e1e");
      else if (e.warnT > 0) drawSpeech(x, y - 30, "여기서 이러시면 안됩니다", 1, "#c81e1e");
      else if (e.spookT > 0) drawSpeech(x, y - 30, "쎄한느낌이...");
      else if (e.turnT > 0) {
        ctx.fillStyle = "#ffd24d"; ctx.font = "11px Galmuri11, monospace"; ctx.textAlign = "center";
        ctx.fillText("?", x, y - 32);
      }
    }
  }

  function drawPlayer() {
    const p = player;
    const x = p.x + p.w / 2, y = p.y;
    const inv = ninjaTimer > 0;
    ctx.save();
    if (p.stunT > 0) ctx.translate(Math.round(Math.random() * 2 - 1), 0);  // 쪽팔려 덜덜
    if (inv) ctx.globalAlpha = 0.45 + Math.sin(performance.now() / 80) * 0.15;
    if (caughtFlash > 0 && Math.floor(performance.now() / 80) % 2) ctx.globalAlpha = 0.3;

    const walking = Math.abs(p.vx) > 0.1 && p.onGround;
    const step = walking ? (Math.sin(p.animT * 16) > 0 ? 2 : -2) : 0;
    const flut = Math.sin(performance.now() / 90) * 1.5;                              // 나부끼는 끈(닌자)

    // 캐릭터 본체 — outline 색이 주어지면 전체를 그 색으로(화이트 가장자리 스탬프용)
    const paint = (o) => {
      if (inv) {
        // 닌자화 의상 (닌자복 + 복면 + 붉은 머리띠)
        ctx.fillStyle = o || "#23252e"; ctx.fillRect(x - 6, y - 18, 12, 16);             // 닌자복 몸통
        if (!o) { ctx.fillStyle = "#2c2f3a"; ctx.fillRect(x - 6, y - 18, 12, 2); }       // 어깨 하이라이트
        ctx.fillStyle = o || "#1a1c24"; ctx.fillRect(x - 4, y - 24, 8, 7);               // 복면 머리
        if (!o) {
          ctx.fillStyle = "#e9d9b8"; ctx.fillRect(x - 4, y - 22, 8, 2);                  // 눈 부위(복면 띠)
          ctx.fillStyle = "#222"; ctx.fillRect(x + (p.dir === 1 ? 1 : -2), y - 22, 1, 2); // 눈동자
        }
        ctx.fillStyle = o || "#b8322f"; ctx.fillRect(x - 5, y - 25, 10, 2);              // 붉은 머리띠
        ctx.fillRect(x + (p.dir === 1 ? -9 : 7), y - 25 + flut, 4, 1);
        ctx.fillRect(x + (p.dir === 1 ? -10 : 9), y - 24 - flut, 3, 1);
        ctx.fillStyle = o || "#15161c";                                                  // 검은 타비(다리)
        ctx.fillRect(x - 5, y - 2, 4, 4 + step); ctx.fillRect(x + 1, y - 2, 4, 4 - step);
      } else {
        // 몸 (후드티 아티스트)
        ctx.fillStyle = o || "#c8443c"; ctx.fillRect(x - 6, y - 18, 12, 16);
        // 머리 + 후드
        ctx.fillStyle = o || "#e7c39a"; ctx.fillRect(x - 4, y - 24, 8, 7);
        ctx.fillStyle = o || "#8e2f2a"; ctx.fillRect(x - 5, y - 26, 10, 4);
        // 눈 (방향)
        if (!o) { ctx.fillStyle = "#222"; ctx.fillRect(x + (p.dir === 1 ? 1 : -3), y - 21, 2, 2); }
        // 다리
        ctx.fillStyle = o || "#333";
        ctx.fillRect(x - 5, y - 2, 4, 4 + step); ctx.fillRect(x + 1, y - 2, 4, 4 - step);
      }
      // 전단지 가방 (공통)
      ctx.fillStyle = o || (inv ? "#3a3d48" : "#d9c27a"); ctx.fillRect(x + (p.dir === 1 ? -9 : 5), y - 12, 4, 8);
      // 부착 모션 (팔 위로)
      if (p.attaching > 0) {
        ctx.fillStyle = o || "#e7c39a";
        ctx.fillRect(x + (p.dir === 1 ? 5 : -7), y - 22, 2, 6);
      }
    };
    for (const ofs of OUTLINE_OFF) { ctx.save(); ctx.translate(ofs[0], ofs[1]); paint("#fff"); ctx.restore(); }  // 화이트 가장자리
    paint(null);
    // 눈치보는 중: 몸이 얼어붙는 시각 효과 + 식은땀
    if (p.watchedT > 0) {
      ctx.fillStyle = "rgba(160,220,255,0.32)";
      ctx.fillRect(x - 8, y - 27, 16, 27);
      ctx.strokeStyle = "rgba(225,245,255,0.8)"; ctx.lineWidth = 1;
      ctx.strokeRect(x - 8 + 0.5, y - 27 + 0.5, 16, 27);
      ctx.fillStyle = "rgba(255,255,255,0.7)";        // 얼음 결정 광택
      ctx.fillRect(x - 5, y - 24, 1, 6); ctx.fillRect(x + 4, y - 14, 1, 5);
      ctx.fillStyle = "#9fdcff";                      // 식은땀
      ctx.fillRect(x + (p.dir === 1 ? 6 : -7), y - 20, 2, 3);
    }
    // 쪽팔려(행동불능): 얼굴 빨개짐 + 손으로 가림
    if (p.stunT > 0) {
      ctx.fillStyle = "rgba(255,90,90,0.55)"; ctx.fillRect(x - 4, y - 22, 8, 5);  // 홍조
      ctx.fillStyle = "#e7c39a"; ctx.fillRect(x - 5, y - 21, 3, 6); ctx.fillRect(x + 2, y - 21, 3, 6); // 두 손
    }
    ctx.restore();
  }

  // --- HUD -----------------------------------------------------------------
  function drawHUD() {
    // 시간 게이지
    const barW = 180, bx = 12, by = 12;
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx - 2, by - 2, barW + 4, 12);
    const ratio = clamp(timeLeft / TUNE.timeStart, 0, 1);
    ctx.fillStyle = ratio < 0.25 ? "#ff5555" : ratio < 0.5 ? "#ffcc44" : "#5cff9e";
    ctx.fillRect(bx, by, barW * ratio, 8);
    ctx.fillStyle = "#fff"; ctx.font = "bold 8px Galmuri11, monospace"; ctx.textAlign = "left";
    ctx.fillText("TIME " + Math.ceil(timeLeft) + "s", bx, by + 22);
    // 스테이지
    ctx.fillStyle = "#ffd24d";
    ctx.fillText("STAGE " + (stageIdx + 1) + " · " + STAGES[stageIdx].name, bx, by + 34);
    ctx.fillStyle = "#ffe680"; ctx.fillText("$ " + best.coins, bx, by + 46);     // 지갑(코인)
    // 츄르 인벤(아이콘 × 갯수)
    const iy = by + 51;
    ctx.fillStyle = "#9fe0ff"; ctx.fillRect(bx, iy, 11, 5);                       // 츄르 튜브
    ctx.fillStyle = "#5ab0d8"; ctx.fillRect(bx, iy, 2, 5); ctx.fillRect(bx + 9, iy + 1, 2, 3);
    ctx.fillStyle = "#fff"; ctx.font = "bold 8px Galmuri11, monospace"; ctx.fillText("x " + best.churu, bx + 15, iy + 5);

    // 정지 버튼 (우측 상단)
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(PAUSE_BTN.x, PAUSE_BTN.y, PAUSE_BTN.w, PAUSE_BTN.h);
    ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1;
    ctx.strokeRect(PAUSE_BTN.x + 0.5, PAUSE_BTN.y + 0.5, PAUSE_BTN.w - 1, PAUSE_BTN.h - 1);
    ctx.fillStyle = "#fff";
    if (state === STATE.PAUSED) {   // ▶ 재생 아이콘
      ctx.beginPath();
      ctx.moveTo(PAUSE_BTN.x + 6, PAUSE_BTN.y + 4); ctx.lineTo(PAUSE_BTN.x + 6, PAUSE_BTN.y + 12); ctx.lineTo(PAUSE_BTN.x + 12, PAUSE_BTN.y + 8);
      ctx.closePath(); ctx.fill();
    } else {                        // ❚❚ 일시정지 아이콘
      ctx.fillRect(PAUSE_BTN.x + 5, PAUSE_BTN.y + 4, 2, 8); ctx.fillRect(PAUSE_BTN.x + 9, PAUSE_BTN.y + 4, 2, 8);
    }

    // 점수 + 전체 전단지 진행
    ctx.textAlign = "right"; ctx.font = "bold 12px Galmuri11, monospace"; ctx.fillStyle = "#fff";
    ctx.fillText("SCORE " + score, VW - 28, by + 10);
    const totFilled = spots.reduce((a, s) => a + s.filled, 0);
    const totSlots = spots.reduce((a, s) => a + s.slots, 0);
    const allDone = totFilled >= totSlots;
    ctx.font = "bold 8px Galmuri11, monospace"; ctx.fillStyle = allDone ? "#5cff9e" : "#ffd24d";
    ctx.fillText("전단지 " + totFilled + "/" + totSlots + (allDone ? " · 공중전화로!" : ""), VW - 12, by + 24);

    // 닌자화 타이머
    if (ninjaTimer > 0) {
      ctx.fillStyle = "#7fffd4"; ctx.textAlign = "center"; ctx.font = "bold 9px Galmuri11, monospace";
      ctx.fillText("닌자화 " + ninjaTimer.toFixed(1) + "s", VW / 2, 18);
      ctx.fillStyle = "rgba(127,255,212,0.5)";
      ctx.fillRect(VW / 2 - 40, 22, 80 * (ninjaTimer / TUNE.ninjaDuration), 3);
    }

    // 단속반에게 발각 → '눈치보는 중...' (이동 둔화)
    if (player.watchedT > 0) {
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(40,30,8,0.75)"; ctx.fillRect(VW / 2 - 78, 30, 156, 26);
      ctx.strokeStyle = "#ffd24d"; ctx.lineWidth = 1;
      ctx.strokeRect(VW / 2 - 78 + 0.5, 30.5, 156, 26);
      ctx.fillStyle = "#ffe08a"; ctx.font = "11px Galmuri11, monospace";
      ctx.fillText("눈치보는 중...", VW / 2, 47);
      ctx.fillStyle = "rgba(255,255,255,0.18)"; ctx.fillRect(VW / 2 - 60, 60, 120, 3);
      ctx.fillStyle = "#ffd24d"; ctx.fillRect(VW / 2 - 60, 60, 120 * (player.watchedT / TUNE.watchedTime), 3);
    }

    // 행동불능('쪽팔려...') — '눈치보는 중'과 동일한 디자인(상단 패널)
    if (player.stunT > 0) {
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(40,30,8,0.75)"; ctx.fillRect(VW / 2 - 78, 30, 156, 26);
      ctx.strokeStyle = "#ffd24d"; ctx.lineWidth = 1;
      ctx.strokeRect(VW / 2 - 78 + 0.5, 30.5, 156, 26);
      ctx.fillStyle = "#ffe08a"; ctx.font = "11px Galmuri11, monospace";
      ctx.fillText("쪽팔려...", VW / 2, 47);
      ctx.fillStyle = "rgba(255,255,255,0.18)"; ctx.fillRect(VW / 2 - 60, 60, 120, 3);
      ctx.fillStyle = "#ffd24d"; ctx.fillRect(VW / 2 - 60, 60, 120 * (player.stunT / TUNE.embarrassTime), 3);
    }

    // 점수 차감: 화면 중앙 빨간색 (+ 메시지)
    if (penaltyT > 0) {
      ctx.textAlign = "center";
      ctx.globalAlpha = clamp(penaltyT / 1.4, 0, 1);
      if (penaltyMsg) {
        ctx.fillStyle = "#ff5555"; ctx.font = "18px Galmuri11, monospace";
        ctx.fillText(penaltyMsg, VW / 2, VH / 2 - 16);
      }
      const pop = 1 + clamp((penaltyT - 1.1) / 0.3, 0, 1) * 0.4;  // 등장 시 살짝 커짐
      ctx.fillStyle = "#ff2a2a"; ctx.font = Math.round(30 * pop) + "px Galmuri11, monospace";
      ctx.fillText("-" + penaltyAmt, VW / 2, VH / 2 + 16);
      ctx.globalAlpha = 1;
    }

    // 메시지 토스트
    if (msgT > 0) {
      ctx.globalAlpha = clamp(msgT, 0, 1);
      ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "10px Galmuri11, monospace";
      ctx.fillText(msg, VW / 2, 52);
      ctx.globalAlpha = 1;
    }

    // 중앙 알림(배경 패널 + 페이드 인/아웃, 2초)
    if (bigT > 0) {
      const a = clamp(Math.min(bigT, 2 - bigT) / 0.4, 0, 1);   // 앞 0.4s 페이드인 · 끝 0.4s 페이드아웃
      const lines = bigMsg.split("\n"), cx = VW / 2, cy = VH / 2;
      ctx.font = "12px Galmuri11, monospace"; ctx.textAlign = "center";

  // 타이틀 배경 연출: 날아다니는 전단지 + 간간이 지나가는 새 무리
  function drawTitleAtmos() {
    const t = performance.now() / 1000;
    // 떠다니는 전단지
    for (let i = 0; i < 7; i++) {
      const speed = 16 + (i % 3) * 10, span = VW + 60;
      const x = ((t * speed + i * 137) % span) - 30;
      const y = 26 + (i * 71 % 200) + Math.sin(t * 1.2 + i) * 12;
      const rot = Math.sin(t * 1.8 + i * 1.7) * 0.7;
      const sc = 0.55 + (i % 3) * 0.3;
      ctx.save();
      ctx.translate(x, y); ctx.rotate(rot); ctx.scale(sc, sc);
      ctx.globalAlpha = 0.72;
      ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(-4, -6, 10, 14);    // 그림자
      ctx.fillStyle = "#bdbdb6"; ctx.fillRect(-5, -7, 10, 14);             // 종이(약간 어둡게)
      ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-5, -7, 10, 3);      // 제목줄
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(-4, -1, 8, 1); ctx.fillRect(-4, 2, 8, 1); ctx.fillRect(-4, 5, 6, 1);  // 본문줄
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    // 새 — 여러 마리가 랜덤하게 출몰(크기·높이·방향·속도 다양). 2개 트랙으로 더 자주.
    const SLOT = 3.6;
    for (let tr = 0; tr < 2; tr++) {
      const tt = t + tr * 1.9;
      const slot = Math.floor(tt / SLOT);
      const rnd = (k) => { const x = Math.sin(slot * 78.233 + tr * 23.17 + k * 12.9898) * 43758.5453; return x - Math.floor(x); };
      if (rnd(5) <= 0.16) continue;                  // 일부 구간만 비움
      const cd = 3.0 + rnd(4) * 2.2;                 // 횡단 시간(속도 랜덤)
      const local = tt - slot * SLOT;
      if (local >= cd) continue;
      const prog = local / cd;
      const dir = rnd(1) < 0.5 ? 1 : -1;
      const by = 14 + rnd(2) * 78;                   // 높이 랜덤
      const sc = 0.7 + rnd(3) * 1.1;                 // 크기 다양화(0.7~1.8배)
      const w = 4 * sc;
      const bx = dir > 0 ? -20 + prog * (VW + 40) : VW + 20 - prog * (VW + 40);
      const flap = Math.sin(t * 8 + tr) * 3 * sc;
      ctx.strokeStyle = "rgba(15,15,28,0.7)"; ctx.lineWidth = 1.1 + sc * 0.5;
      ctx.beginPath();
      ctx.moveTo(bx - w, by + flap); ctx.lineTo(bx, by); ctx.lineTo(bx + w, by + flap);
      ctx.stroke();
    }
  }

  // --- 기록(랭크) 화면 — 다른 유저와 비교하는 랭킹 (총 수익 / 스테이지별) ---
  const FAKE_NAMES = ["김전단", "박포스터", "이찌라시", "최벽보", "정게릴라", "한밤손", "오스티커", "유야근", "서골목", "문대자보", "강간판"];
  function fakeBoard(seed, myVal, hi) {
    const R = rngFor(seed * 7919 + 31);
    const list = [];
    for (let i = 0; i < 7; i++) list.push({ name: FAKE_NAMES[(seed * 3 + i) % FAKE_NAMES.length], val: Math.round((0.18 + R() * 0.82) * hi / 100) * 100, me: false });
    list.push({ name: best.name || "나", val: myVal, me: true });
    list.sort((a, b) => b.val - a.val);
    return list;
  }
  // --- 스테이지 선택 (10개 맵 미니맵) -------------------------------------
  function renderSelect() {
    if (!selectMaps) selectMaps = STAGES.map((s, i) => buildLayout(i, { enfSpeedMul: 1, spotMul: 1 }));
    const cx = VW / 2;
    ctx.fillStyle = "#0c0f1c"; ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = "center"; ctx.fillStyle = "#ffd24d"; ctx.font = "15px Galmuri11, monospace";
    ctx.fillText("거리 선택", cx, 26);

    selectCells = [];
    const cols = 5, cw = 65, th = 52, gx = 12, rowH = 86;   // 썸네일 높이 th, 행 간격 rowH(이름·점수 외부 공간 포함)
    const x0 = (VW - (cols * cw + (cols - 1) * gx)) / 2, y0 = 62;  // 썸네일 윗변(이름은 그 위)
    // 스네이크 배치: 윗줄 좌→우, 아랫줄 우→좌 (1→10 한 동선)
    const pos = [];
    for (let i = 0; i < STAGES.length; i++) {
      const row = (i / cols) | 0;
      const col = row % 2 === 0 ? (i % cols) : (cols - 1 - (i % cols));
      pos.push({ ax: x0 + col * (cw + gx), ay: y0 + row * rowH });
    }
    // 1) 흐름 화살표(썸네일 사이, 진행 방향)
    ctx.fillStyle = "#ffd24d"; ctx.font = "12px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for (let i = 0; i < pos.length - 1; i++) {
      const a = pos[i], b = pos[i + 1];
      const amx = (a.ax + b.ax) / 2 + cw / 2, amy = (a.ay + b.ay) / 2 + th / 2;
      ctx.fillText(a.ay === b.ay ? (b.ax > a.ax ? "▸" : "◂") : "▾", amx, amy);
    }
    ctx.textBaseline = "alphabetic";
    // 2) 셀
    for (let i = 0; i < STAGES.length; i++) {
      const ax = pos[i].ax, ay = pos[i].ay, ccx = ax + cw / 2;
      const locked = i > progress, S = STAGES[i], L = selectMaps[i];
      // 거리 이름 — 썸네일 외부 위
      ctx.save(); ctx.beginPath(); ctx.rect(ax - 6, ay - 14, cw + 12, 12); ctx.clip();
      ctx.textAlign = "center"; ctx.fillStyle = locked ? "#8a8a92" : "#fff"; ctx.font = "8px Galmuri11, monospace";
      ctx.fillText((i + 1) + ". " + S.name, ccx, ay - 4);
      ctx.restore();
      // 썸네일(미니맵)
      ctx.fillStyle = S.sky[0]; ctx.fillRect(ax, ay, cw, th);
      ctx.fillStyle = S.sky[1]; ctx.fillRect(ax, ay + th - 20, cw, 20);
      const scX = (cw - 6) / WORLD_W, scY = (th - 8) / 270, mx0 = ax + 3, my0 = ay + 4;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      for (const pl of L.platforms) ctx.fillRect(mx0 + pl.x * scX, my0 + pl.y * scY, pl.y === GROUND_Y ? cw - 6 : Math.max(3, pl.w * scX), 2);
      ctx.fillStyle = locked ? "#888" : "#ffd24d";
      for (const sp of L.spots) ctx.fillRect(mx0 + sp.x * scX - 1, my0 + sp.y * scY - 3, 2, 3);
      if (locked) {
        ctx.fillStyle = "rgba(6,8,14,0.62)"; ctx.fillRect(ax, ay, cw, th);
        const lx = ccx, ly = ay + th / 2 - 2;                      // 자물쇠 중앙
        ctx.fillStyle = "#dde4ee"; ctx.fillRect(lx - 6, ly, 12, 9);
        ctx.strokeStyle = "#dde4ee"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(lx, ly, 4, Math.PI, 0); ctx.stroke();
        ctx.fillStyle = "#2a2a34"; ctx.fillRect(lx - 1, ly + 3, 2, 4);
      }
      ctx.strokeStyle = locked ? "#3a3a44" : (i === progress ? "#ffd24d" : "#9fb8d8"); ctx.lineWidth = i === progress ? 2 : 1;

  function renderRecords() {
    const sky = STAGES[progress].sky;

    ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);

    const cx = VW / 2;

    ctx.textAlign = "center"; ctx.fillStyle = "#ffd24d"; ctx.font = "15px Galmuri11, monospace";
    ctx.fillText("랭킹 — 전단지왕 도전", cx, 26);
    ctx.fillStyle = "#5cff9e"; ctx.font = "10px Galmuri11, monospace";
    ctx.fillText("총 정산액: " + best.life.toLocaleString(), cx, 42);

    // 현재 페이지: 0=총 수익, 1..N=스테이지별 수익
    const isTotal = recordsPage === 0;
    const sIdx = recordsPage - 1;
    const myVal = isTotal ? best.life : (best.stageEarn[sIdx] || 0);
    const hi = isTotal ? 140000 : 4000 + sIdx * 2200;
    // 온라인이면 서버 랭킹(총·스테이지별 모두), 아니면 로컬 더미
    let board, loadingMsg = "";
    const bc = netOn() ? boardCache[recordsPage] : null;
    if (netOn()) {
      if (bc === "loading" || bc == null) { board = []; loadingMsg = "랭킹 불러오는 중..."; }
      else if (bc === "error") { board = fakeBoard(recordsPage + 1, myVal, hi); loadingMsg = "(오프라인 — 임시 표시)"; }
      else {
        board = bc.map(r => ({ name: r.name, val: r.val || 0, me: r.name === best.name }));
        if (best.name && !board.some(x => x.me)) board.push({ name: best.name, val: myVal, me: true });
        board.sort((a, b) => b.val - a.val);
        board = board.slice(0, 8);
      }
    } else {
      board = fakeBoard(recordsPage + 1, myVal, hi);
    }

    // 랭킹 리스트
    const px = 74, pw = 332, py = 50, rowH = 19;
    ctx.fillStyle = "rgba(10,16,30,0.6)"; ctx.fillRect(px, py, pw, rowH * 8 + 8);
    ctx.strokeStyle = "#5a6a8a"; ctx.lineWidth = 1; ctx.strokeRect(px + 0.5, py + 0.5, pw, rowH * 8 + 8);
    for (let i = 0; i < board.length; i++) {
      const e = board[i], yy = py + 8 + i * rowH;
      if (e.me) { ctx.fillStyle = "rgba(255,210,77,0.18)"; ctx.fillRect(px + 2, yy - 1, pw - 4, rowH - 2); }
      ctx.textAlign = "left"; ctx.font = "10px Galmuri11, monospace";
      ctx.fillStyle = i === 0 ? "#ffd24d" : e.me ? "#fff" : "#9fb8d8";
      ctx.fillText((i + 1) + ".", px + 12, yy + 12);
      ctx.fillStyle = e.me ? "#ffe08a" : "#cfd8e8";
      ctx.fillText(e.name + (e.me ? " (나)" : ""), px + 34, yy + 12);
      ctx.textAlign = "right"; ctx.fillStyle = e.me ? "#ffd24d" : "#bcd0e8";

    // 페이지 이동: ◂ 라벨 ▸
    const al = ARROW_L, ar = ARROW_R;
    const drawArrow = (bx2, ch) => { ctx.fillStyle = "#2a2a44"; ctx.fillRect(bx2.x, bx2.y, bx2.w, bx2.h); ctx.strokeStyle = "#5a6a8a"; ctx.lineWidth = 1; ctx.strokeRect(bx2.x + 0.5, bx2.y + 0.5, bx2.w - 1, bx2.h - 1); ctx.fillStyle = "#cfe0ff"; ctx.font = "12px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.fillText(ch, bx2.x + bx2.w / 2, bx2.y + 15); };
    drawArrow(al, "◂"); drawArrow(ar, "▸");

  // 튜토리얼 안내용 키 표시(머리 위 [J] 등) — 통통 튀어 시선 유도
  function tutKey(x, y, label) {
    const yy = y + Math.sin(performance.now() / 240) * 1.6;

    ctx.font = "bold 9px Galmuri11, monospace"; ctx.textAlign = "center";
    const w = Math.max(15, Math.ceil(ctx.measureText(label).width) + 8), h = 13;
    ctx.fillStyle = "#15151c"; ctx.fillRect(x - w / 2, yy - h, w, h);
    ctx.strokeStyle = "#ffd24d"; ctx.lineWidth = 1; ctx.strokeRect(x - w / 2 + 0.5, yy - h + 0.5, w - 1, h - 1);
    ctx.fillStyle = "#222"; ctx.fillRect(x - 1, yy, 2, 2);                          // 말풍선 꼬리

      tutKey(acx - 22, acy - 28, "← →");                                          // 도망(이동) 키
    } else if (page.anim === "phone") {
      const c = tt % 2.0;
      ctx.fillStyle = "#c23b3b"; ctx.fillRect(acx + 12, acy - 32, 22, 34);                      // 부스

      ctx.fillStyle = "#7fffd4"; ctx.font = "bold 9px Galmuri11, monospace"; ctx.textAlign = "center"; ctx.fillText("+시간!", acx + 48, acy - 16 - (c % 1) * 8); // 부스 오른쪽
      tutKey(acx + 23, acy - 38, "J");                                            // 전화부스 위 [J]
    } else if (page.anim === "dog") {
      const c = tt % 2.0;
      const dogX = acx + 22 - Math.min(24, tt * 12 % 36);
      tutPerson(acx - 18, acy + 4, "#c8443c", false);
      drawDogSprite(dogX, acy + 4, "#caa06a", -1, tutT, (tt % 2.0) < 1.2);
      ctx.fillStyle = "#d23a3a"; ctx.fillRect(dogX - 6, acy - 3, 5, 2);                          // 빨간 목걸이
      if (c > 0.6) { ctx.globalAlpha = Math.min(1, (c - 0.6) / 0.5); ctx.fillStyle = "#ff6b8a"; const hy = acy - 20 - (c - 0.6) * 6; ctx.fillRect(acx - 16, hy, 2, 2); ctx.fillRect(acx - 13, hy, 2, 2); ctx.fillRect(acx - 15, hy + 2, 4, 2); ctx.fillRect(acx - 14, hy + 4, 2, 2); ctx.globalAlpha = 1; }
      tutKey(dogX, acy - 14, "J");                                                // 강아지 머리 위 쓰다듬기 키
    } else {  // cat — 고양이가 전단지를 찢음, 츄르로 막기
      const c = tt % 2.0, torn = c > 1.1;

      ctx.fillStyle = "#54546a"; ctx.fillRect(acx + 12, acy - 30, 30, 34);
      ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(acx + 12, acy - 13, 30, 1);

    // 안내

    ctx.fillText(last ? "▶ 시작하기  (클릭 / ENTER)" : "▶ 다음  (클릭 / ENTER)", cx, VH - 8);
  }

  function renderIntro() {
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, VW, VH);
    const perChar = 0.09, typeDur = INTRO_TEXT.length * perChar;
    const cardStart = typeDur + 0.8;       // 대사 후 잠깐 머문 뒤 카드
    const cardDur = 1.8;

    if (introT < cardStart) {
      // 1) 대사 한 글자씩
      const n = Math.min(INTRO_TEXT.length, Math.floor(introT / perChar));
      const done = n >= INTRO_TEXT.length;
      const cursor = (!done || Math.floor(performance.now() / 400) % 2) ? "▌" : " ";
      ctx.textAlign = "center"; ctx.fillStyle = "#e8e8ee"; ctx.font = "12px Galmuri11, monospace";
      ctx.fillText(INTRO_TEXT.slice(0, n) + cursor, VW / 2, VH / 2);
    } else {
      // 2) 스테이지명 '짠' 등장 → 유지 → 페이드
      const ct = introT - cardStart;
      let a = 1;
      if (ct < 0.25) a = ct / 0.25;                 // 짠 등장
      else if (ct > cardDur - 0.5) a = Math.max(0, (cardDur - ct) / 0.5);  // 사라짐
      ctx.globalAlpha = a;
      ctx.textAlign = "center";
      ctx.fillStyle = "#9fb8d8"; ctx.font = "9px Galmuri11, monospace";
      ctx.fillText(`STAGE ${introTarget + 1}`, VW / 2, VH / 2 - 16);
      ctx.fillStyle = "#ffd24d"; ctx.font = "22px Galmuri11, monospace";
      ctx.fillText(STAGES[introTarget].name, VW / 2, VH / 2 + 10);
      ctx.globalAlpha = 1;
      if (ct >= cardDur) introProceed();
    }
  }

  // --- 정산 화면 (통장 잔고 스타일) ----------------------------------------
  function renderSettle() {
    ctx.fillStyle = "rgba(8,8,16,0.85)"; ctx.fillRect(0, 0, VW, VH);

    const last = stageIdx >= STAGES.length - 1;

    const px = 64, py = 34, pw = 352, ph = 200;

    ctx.textAlign = "right"; ctx.fillStyle = "#6a5a3a"; ctx.font = "7px Galmuri11, monospace";
    ctx.fillText("예금주: 전단지 아티스트", px + pw - 10, py + 14);

    // 컬럼 헤더 (잔액 없음)
    let ry = py + 40;
    ctx.fillStyle = "#8a7a52"; ctx.font = "7px Galmuri11, monospace";
    ctx.textAlign = "left";  ctx.fillText("거 래 내 용", px + 12, ry);
    ctx.textAlign = "right"; ctx.fillText("정 산", px + pw - 14, ry);
    ctx.strokeStyle = "#cfc3a0"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 10, ry + 4); ctx.lineTo(px + pw - 10, ry + 4); ctx.stroke();

    // 거래 행: 전단지 부착 정산(보너스 제외분)
    const baseReward = stageReward - callBonus * 10;
    ry += 22;
    ctx.fillStyle = "#2a2418"; ctx.font = "9px Galmuri11, monospace"; ctx.textAlign = "left";
    ctx.fillText(`전단지 부착 ${totFilled}/${totSlots}장`, px + 12, ry);
    ctx.textAlign = "right"; ctx.fillStyle = "#1a7a3a"; ctx.fillText(`+${baseReward.toLocaleString()}`, px + pw - 14, ry);
    ctx.fillStyle = "#8a7a52"; ctx.font = "7px Galmuri11, monospace"; ctx.textAlign = "left";
    ctx.fillText(`· ${score}점 (RANK ${rank})`, px + 16, ry + 12);

    // 빠른부착 추가수당 (시간점수 있을 때만)
    if (callAllDone && callBonus > 0) {
      ry += 26;
      ctx.fillStyle = "#2a2418"; ctx.font = "9px Galmuri11, monospace"; ctx.textAlign = "left";
      ctx.fillText("빠른부착 추가수당", px + 12, ry);
      ctx.textAlign = "right"; ctx.fillStyle = "#1a7a3a"; ctx.fillText(`+${(callBonus * 10).toLocaleString()}`, px + pw - 14, ry);
    }

    // 정산 금액 (이번 스테이지만, 누적 없음)
    ry += 28;
    ctx.fillStyle = "#1e3a6e"; ctx.textAlign = "left"; ctx.font = "10px Galmuri11, monospace";
    ctx.fillText("정산 금액", px + 16, ry + 12);
    ctx.textAlign = "right"; ctx.font = "20px Galmuri11, monospace"; ctx.fillStyle = "#1e3a6e";
    ctx.fillText(`₩ ${stageReward.toLocaleString()}`, px + pw - 14, ry + 14);
    // 합산(누적) 점수 + 누적 랭크
    const total = sumVals(runScores), tRank = rankRatio(total / Math.max(1, sumVals(runMax)));
    ry += 18;
    ctx.fillStyle = "#6a5a3a"; ctx.font = "8px Galmuri11, monospace"; ctx.textAlign = "left";
    ctx.fillText(`합산 ${total.toLocaleString()}점`, px + 16, ry + 8);
    ctx.textAlign = "right"; ctx.fillStyle = "#c83a2a";
    ctx.fillText(`누적 RANK ${tRank}` + (total >= best.t ? "  ★최고기록!" : `  (최고 ${best.t.toLocaleString()})`), px + pw - 14, ry + 8);

    // 랭크 도장
    ctx.save();
    ctx.translate(px + 60, py + ph - 42); ctx.rotate(-0.2);
    ctx.strokeStyle = "#c83a2a"; ctx.lineWidth = 2; ctx.strokeRect(-18, -14, 36, 28);
    ctx.fillStyle = "#c83a2a"; ctx.textAlign = "center"; ctx.font = "16px Galmuri11, monospace";
    ctx.fillText(rank, 0, 6);
    ctx.restore();

    // 합격 안내 한 줄
    ctx.textAlign = "center"; ctx.font = "8px Galmuri11, monospace";
    ctx.fillStyle = stagePassed ? "#7fffd4" : "#ff9a9a";
    ctx.fillText(stagePassed ? (last ? "청와대까지 클리어! 수고했어요" : "B등급 달성 — 다음 거리 해금!") : "B등급 미만 — 다시 붙여보자", VW / 2, py + ph - 16);

    // === 하단 버튼: 다시 붙이기 / 처음으로 / (통과 시) 다음 거리 ===
    settleBtns = [];
    const showNext = stagePassed && !last;
    const labels = [
      { t: "다시 붙이기", action: retryStage, col: "#3a3a52" },
      { t: "처음으로", action: resetToMenu, col: "#3a3a52" },
    ];
    if (showNext) labels.push({ t: "다음 거리", action: goNextStage, col: "#1a7a3a", badge: justUnlocked });
    const bw2 = 96, gap = 10, bh2 = 26, byb = py + ph + 8;
    const totalW = labels.length * bw2 + (labels.length - 1) * gap;
    let bxb = VW / 2 - totalW / 2;
    for (const L of labels) {
      ctx.fillStyle = L.col; ctx.fillRect(bxb, byb, bw2, bh2);
      ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1; ctx.strokeRect(bxb + 0.5, byb + 0.5, bw2 - 1, bh2 - 1);
      ctx.fillStyle = "#fff"; ctx.font = "10px Galmuri11, monospace"; ctx.textAlign = "center";
      ctx.fillText(L.t, bxb + bw2 / 2, byb + 17);
      if (L.badge) {                       // 최초 해금 'new'
        ctx.fillStyle = "#ff3b6b"; ctx.fillRect(bxb + bw2 - 22, byb - 6, 22, 12);
        ctx.fillStyle = "#fff"; ctx.font = "8px Galmuri11, monospace"; ctx.fillText("new", bxb + bw2 - 11, byb + 3);
      }
      settleBtns.push({ x: bxb, y: byb, w: bw2, h: bh2, action: L.action });
      bxb += bw2 + gap;
    }

    // 키보드: Enter = 기본 동작(통과 시 다음 거리, 아니면 다시 붙이기)
    if (consumePress("Enter")) (showNext ? goNextStage : retryStage)();
  }

  // --- 유틸 ----------------------------------------------------------------
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  requestAnimationFrame(loop);
})();

</script></body></html>
